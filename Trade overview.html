<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NinjaTrack – Trade Overview</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    .animate-pulse-dot {
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .4
      }
    }

    .animate-spin {
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      from {
        transform: rotate(0deg)
      }

      to {
        transform: rotate(360deg)
      }
    }

    .fade-in {
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    /* Sticky save float */
    .save-float {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 100;
    }

    /* Export Mode overrides for HTML2Canvas */
    .export-only {
      display: none !important;
    }

    .export-mode .export-only {
      display: block !important;
    }

    .export-mode #manifest-export-container {
      width: max-content !important;
      min-width: 100% !important;
    }

    .export-mode .export-flex-row {
      display: flex !important;
      flex-wrap: nowrap !important;
      gap: 1.5rem !important;
    }

    .export-mode .export-flex-row>div:first-child {
      flex: 1 1 auto !important;
      width: max-content !important;
    }

    .export-mode .export-flex-row>div:last-child {
      flex: 0 0 320px !important;
      min-width: 320px !important;
    }

    .export-mode #manifest-export-container .overflow-x-auto,
    .export-mode #manifest-export-container .overflow-hidden {
      overflow: visible !important;
    }

    .export-mode .export-hide-supplier {
      display: none !important;
    }

    /* Force all animations to resolve instantly for clean capture */
    .export-mode,
    .export-mode * {
      animation: none !important;
      transition: none !important;
      opacity: 1 !important;
      transform: none !important;
    }
  </style>
</head>

<body class="bg-[#F8FAFC] text-slate-900 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useRef, useCallback } = React;

    // ─── CONFIG ──────────────────────────────────────────────────
    const SUPABASE_URL = 'https://oiyhrmvcsjxmnfofodhe.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_ol8Jx4QsNZ22v-C1zSBoNQ_AHLFAAFT';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const MAX_TRUCK_CAPACITY = 1200;

    // ─── HELPERS ─────────────────────────────────────────────────
    const fmtDate = (d) => {
      if (!d || d === '---') return d || '--';
      try {
        const dt = new Date(d);
        if (isNaN(dt)) return d;
        return new Intl.DateTimeFormat('en-GB', { day: 'numeric', month: 'short', weekday: 'short' }).format(dt);
      } catch { return d; }
    };

    const weatherFor = (city = '') => {
      const c = city.toLowerCase();
      if (c.includes('bangalore') || c.includes('bengaluru')) return { temp: '24°C', cond: 'Cloudy', icon: '☁️', alert: '' };
      if (c.includes('mumbai')) return { temp: '29°C', cond: 'Rain', icon: '🌧️', alert: 'Rain Risk' };
      if (c.includes('delhi') || c.includes('nokhra')) return { temp: '34°C', cond: 'Sunny', icon: '☀️', alert: 'High Heat' };
      if (c.includes('chennai')) return { temp: '30°C', cond: 'Humid', icon: '💨', alert: '' };
      return { temp: '27°C', cond: 'Clear', icon: '🌤️', alert: '' };
    };

    const ZONE_STYLES = [
      { bg: 'bg-indigo-50', border: 'border-indigo-200', text: 'text-indigo-800', badge: 'bg-indigo-100 text-indigo-700' },
      { bg: 'bg-rose-50', border: 'border-rose-200', text: 'text-rose-800', badge: 'bg-rose-100 text-rose-700' },
      { bg: 'bg-amber-50', border: 'border-amber-200', text: 'text-amber-800', badge: 'bg-amber-100 text-amber-700' },
      { bg: 'bg-emerald-50', border: 'border-emerald-200', text: 'text-emerald-800', badge: 'bg-emerald-100 text-emerald-700' },
      { bg: 'bg-cyan-50', border: 'border-cyan-200', text: 'text-cyan-800', badge: 'bg-cyan-100 text-cyan-700' },
    ];

    // ─── PROCESS RAW SUPABASE DATA ────────────────────────────────
    // Physical front-to-back order of loading positions (Driver Side = front/top of diagram)
    const ZONE_ORDER = ['Driver Side', '2nd From Driver Side', 'Middle', '2nd From Last', 'Opening Side'];
    // Canonical grade sort order for manifest table
    const GRADE_ORDER = ['SSSSS', 'SSSS', 'SSS', 'SS', 'S', 'SPL', 'A1', 'A2', 'A3', 'SB1', 'SB2', 'Loose A', 'Loose B', 'Super 1', 'Super 2', 'K', 'Green', 'Goli', 'F1', 'F2', 'Others'];

    function processTrips(trades, manifests, expenses = []) {
      return trades.map(trade => {
        const mfst = manifests.filter(m => m.trip_id === trade.trip_id);
        const exps = expenses.filter(e => e.trip_id === trade.trip_id);

        // Source-side expenses (Advances)
        const sourceExps = exps.filter(e => e.paid_by === 'Source');
        const transportAdvance = sourceExps.find(e => e.expense_type === 'Transport')?.amount || 0;

        // Demand-side expenses (Deductions)
        const demandExps = exps.filter(e => e.paid_by === 'Demand');
        const dMap = {};
        demandExps.forEach(e => {
          const key = e.expense_type.toLowerCase();
          dMap[key] = e.amount;
          if (key === 'other') dMap.note = e.notes;
        });

        const marksMap = new Map();
        const varietySet = new Set();
        let totalBoxes = 0;
        let totalReceived = 0;
        const zoneMap = new Map();

        mfst.forEach((item, idx) => {
          const brand = item.brand_name || 'Unbranded';
          const variety = item.variety_grade || 'Mix';
          const qty = item.quantity_boxes || 0;
          const recv = item.received_boxes ?? null;
          const rate = item.sales_rate ?? 0;

          varietySet.add(variety);
          totalBoxes += qty;
          if (recv !== null) totalReceived += recv;

          

          let key = brand;
          while (marksMap.has(key) && marksMap.get(key).grades[variety] !== undefined) {
             key += '\u200B';
          }
          if (!marksMap.has(key)) marksMap.set(key, { id: `m-${idx}`, name: key, grades: {} });
          
          marksMap.get(key).grades[variety] = {
            id: item.id, // Store manifest item id for patching
            manifest: qty,
            received: recv,
            rate: rate
          };

          const pattern = item.packing_type || 'General';
          if (!zoneMap.has(pattern)) zoneMap.set(pattern, { count: 0, marks: new Set() });
          zoneMap.get(pattern).count += qty;
          if (brand) zoneMap.get(pattern).marks.add(brand);
        });

        // Sort zones front → back (Driver Side at top of truck diagram)
        const loadingZones = Array.from(zoneMap.entries())
          .sort(([a], [b]) => {
            const ai = ZONE_ORDER.indexOf(a); const bi = ZONE_ORDER.indexOf(b);
            return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
          })
          .map(([name, data], i) => {
            const s = ZONE_STYLES[i % ZONE_STYLES.length];
            return { id: `z-${i}`, name, description: Array.from(data.marks).join(', '), count: data.count, ...s };
          });

        return {
          details: {
            tripId: trade.trip_id,
            vehicleNo: trade.vehicle_number || 'Unknown',
            driverName: trade.driver_name || '--',
            driverContact: trade.driver_mobile || '--',
            origin: trade.source_location || '--',
            destination: trade.destination_market || '--',
            dispatchDate: trade.dispatch_date || '',
            dispatchTime: trade.dispatch_time || '',
            eta: trade.arrival_date || '',
            status: ['CREATED', 'DISPATCHED', 'IN_TRANSIT'].includes(trade.status) ? 'IN_TRANSIT' : trade.status || 'IN_TRANSIT',
            liveUrl: trade.tracking_link || '#',
            supplier: trade.vendor_name || '--',
            tradeMode: trade.trade_mode || 'Commission',
            dtName: trade.dt_name || '',
            transportAdvance,
            freight: dMap.freight || trade.freight_amount || 0,
            coolie: dMap.coolie || trade.coolie_amount || 0,
            commission: dMap.commission || trade.commission_amount || 0,
            otherExpenses: dMap.other || trade.other_expenses || 0,
            otherNote: dMap.note || trade.other_expenses_note || '',
          },
          marks: Array.from(marksMap.values()),
          gradeColumns: Array.from(varietySet).sort((a, b) => {
            const ai = GRADE_ORDER.indexOf(a); const bi = GRADE_ORDER.indexOf(b);
            return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
          }),
          loadingZones,
          totalBoxes,
          totalReceived,
          rawManifest: mfst, // Store for easy reference
          videos: [],
        };
      });
    }

    // ─── STATUS BADGE ─────────────────────────────────────────────
    function StatusBadge({ status }) {
      const isTransit = status === 'IN_TRANSIT';
      const isArrived = status === 'REACHED_MARKET';
      const isSales = ['SALES_STARTED', 'SALES_COMPLETED'].includes(status);
      const isClosed = status === 'CLOSED';

      let cls = 'bg-slate-50 text-slate-600 border-slate-200';
      let dot = 'bg-slate-400';
      let label = status.replace(/_/g, ' ');

      if (isTransit) {
        cls = 'bg-emerald-50 text-emerald-700 border-emerald-200';
        dot = 'bg-emerald-500 animate-pulse-dot';
      } else if (isArrived) {
        cls = 'bg-blue-50 text-blue-700 border-blue-200';
        dot = 'bg-blue-500';
      } else if (isSales) {
        cls = 'bg-amber-50 text-amber-700 border-amber-200';
        dot = 'bg-amber-500';
      } else if (isClosed) {
        cls = 'bg-slate-900 text-slate-100 border-slate-800';
        dot = 'bg-slate-400';
      }

      return (
        <span className={`px-3 py-1 rounded-xl text-[11px] font-bold uppercase tracking-wide border flex items-center gap-1.5 ${cls}`}>
          <span className={`w-2 h-2 rounded-full ${dot}`}></span>{label}
        </span>
      );
    }

    // ─── QUICK STATUS PICKER ───────────────────────────────────
    // Inline 2-click status changer: click badge → pick new status → auto-saves
    function QuickStatusPicker({ tripDetails, onSaved, setSaveMsg, onRequestEdit }) {
      const { status: currentStatus, tripId, destination, eta, dtName } = tripDetails;
      const [open, setOpen] = React.useState(false);
      const [saving, setSaving] = React.useState(false);
      const ref = React.useRef(null);
      React.useEffect(() => {
        const h = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
        document.addEventListener('mousedown', h);
        return () => document.removeEventListener('mousedown', h);
      }, []);

      const pick = async (newStatus) => {
        if (newStatus === currentStatus) { setOpen(false); return; }

        const needsDest = ['REACHED_MARKET', 'SALES_STARTED', 'SALES_COMPLETED', 'CLOSED'].includes(newStatus);
        const needsDt = ['SALES_STARTED', 'SALES_COMPLETED', 'CLOSED'].includes(newStatus);

        const missing = [];
        if (needsDest && !destination?.trim()) missing.push('Destination Market');
        if (needsDest && !eta) missing.push('Arrival Date');
        if (needsDt && !dtName?.trim()) missing.push('DT Name');

        if (missing.length > 0) {
          setOpen(false);
          setSaveMsg(`❌ Required: ${missing[0]}`);
          if (onRequestEdit) onRequestEdit(newStatus);
          return;
        }

        setSaving(true);
        try {
          const { error } = await supabase.from('trades').update({ status: toDbStatus(newStatus) }).eq('trip_id', tripId);
          if (error) throw error;
          onSaved(newStatus);
          setSaveMsg('✓ Status updated');
          setTimeout(() => setSaveMsg(''), 3000);
        } catch (e) {
          setSaveMsg('❌ ' + (e.message || 'Update failed'));
        } finally { setSaving(false); setOpen(false); }
      };

      return (
        <div ref={ref} className="relative">
          <button onClick={() => !saving && setOpen(o => !o)}
            title="Click to change status"
            className="flex items-center gap-1.5 hover:opacity-80 active:scale-95 transition-all cursor-pointer">
            <StatusBadge status={currentStatus} />
            <span className="text-slate-300 text-[10px]">{saving ? '🔄' : '▾'}</span>
          </button>
          {open && (
            <div style={{ position: 'fixed', top: saving ? 0 : undefined, zIndex: 9999 }}
              className="bg-white border border-slate-200 rounded-xl shadow-2xl py-1 min-w-[190px] fade-in"
              ref={node => {
                if (node && ref.current) {
                  const btn = ref.current.querySelector('button');
                  if (btn) {
                    const r = btn.getBoundingClientRect();
                    node.style.top = (r.bottom + 4) + 'px';
                    node.style.left = r.left + 'px';
                  }
                }
              }}>
              <p className="px-3 pt-1.5 pb-1 text-[9px] font-black text-slate-400 uppercase tracking-widest">Change Status</p>
              {STATUSES.map(s => (
                <button key={s.value} onClick={() => pick(s.value)}
                  className={`w-full text-left px-3 py-2 text-sm font-semibold flex items-center gap-2 hover:bg-slate-50 transition-colors
                    ${s.value === currentStatus ? 'text-emerald-700 bg-emerald-50 font-black' : 'text-slate-700'}`}>
                  {s.value === currentStatus && <span className="text-emerald-500 text-xs">✓</span>}
                  {s.label}
                </button>
              ))}
            </div>
          )}
        </div>
      );
    }

    // ─── FLEET CARD ───────────────────────────────────────────────
    function FleetCard({ trip, onClick }) {
      return (
        <div onClick={onClick}
          className="bg-white rounded-xl border border-slate-200 p-5 hover:shadow-lg hover:border-emerald-300 transition-all cursor-pointer group fade-in">
          <div className="flex justify-between items-start mb-4">
            <div className="flex items-center gap-3">
              <div className="w-10 h-10 rounded-lg bg-slate-100 flex items-center justify-center text-2xl group-hover:bg-emerald-50 transition-colors">🚛</div>
              <div>
                <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{trip.details.tripId}</div>
                <div className="font-bold text-slate-900">{trip.details.vehicleNo}</div>
              </div>
            </div>
            <StatusBadge status={trip.details.status} />
          </div>

          <div className="flex items-start justify-between mb-2 text-sm font-semibold text-slate-700">
            <div className="flex flex-col gap-0.5">
              <span>{trip.details.origin}</span>
              {trip.details.supplier && trip.details.supplier !== '--' && (
                <span className="text-[10px] font-bold text-slate-400 truncate max-w-[90px]">{trip.details.supplier}</span>
              )}
            </div>
            <span className="text-slate-300 mx-2 mt-0.5">→</span>
            <div className="flex flex-col gap-0.5 items-end">
              <span>{trip.details.destination}</span>
              {trip.details.dtName && (
                <span className="text-[10px] font-bold text-indigo-400 truncate max-w-[90px]">{trip.details.dtName}</span>
              )}
            </div>
          </div>

          <div className="grid grid-cols-2 gap-2 border-t border-slate-100 pt-3 text-xs">
            <div>
              <div className="text-slate-400 font-bold uppercase text-[10px] mb-0.5">Dispatch</div>
              <div className="font-bold text-slate-800">{fmtDate(trip.details.dispatchDate)}</div>
            </div>
            <div className="text-right">
              <div className="text-slate-400 font-bold uppercase text-[10px] mb-0.5">Boxes</div>
              <div className="font-black text-emerald-600 text-sm">{trip.totalBoxes} 📦</div>
            </div>
          </div>
        </div>
      );
    }

    // ─── DETAIL VIEW ──────────────────────────────────────────────
    // DB enum value → display label. Run: SELECT unnest(enum_range(NULL::trade_status)); to verify exact DB values.
    const STATUSES = [
      { value: 'IN_TRANSIT', label: 'In-transit' },
      { value: 'REACHED_MARKET', label: 'Reached Market' },
      { value: 'SALES_STARTED', label: 'Sales started' },
      { value: 'SALES_COMPLETED', label: 'Sales Completed' },
      { value: 'CLOSED', label: 'Closed' },
    ];
    // Map frontend display values → actual Supabase enum values
    const STATUS_TO_DB = {
      'IN_TRANSIT': 'DISPATCHED',       // DB uses DISPATCHED, we display as IN_TRANSIT
      'REACHED_MARKET': 'REACHED_MARKET',
      'SALES_STARTED': 'SALES_STARTED',
      'SALES_COMPLETED': 'SALES_COMPLETED',
      'CLOSED': 'CLOSED',
    };
    const toDbStatus = s => STATUS_TO_DB[s] || s;

    function DetailView({ trip, allTrips, onBack, onSwitch, onUpdate }) {
      const [videos, setVideos] = useState([]);
      const fileRef = useRef(null);
      const [editing, setEditing] = useState(false);
      const [saving, setSaving] = useState(false);
      const [saveMsg, setSaveMsg] = useState('');
      const [showStatusPrompt, setShowStatusPrompt] = useState(false);
      const [exportPreview, setExportPreview] = useState(null);
      const [exportingType, setExportingType] = useState(null);
      const [localDetails, setLocalDetails] = useState(trip.details);
      const initCustDef = Array.isArray((() => {try{return JSON.parse(trip.details.notes||'{}')}catch{return {}}})()._customerAssignments) ? JSON.parse(trip.details.notes||'{}')._customerAssignments : [];
      const _initialDtName = trip.details.dtName ? trip.details.dtName.split(',').map(s=>s.trim()).filter(Boolean) : [];
      let initialAssignments = initCustDef;
      if (initialAssignments.length === 0 && _initialDtName.length > 0) {
         initialAssignments = _initialDtName.map(n => ({ id: Math.random().toString(), customerName: n, allocations: [] }));
      }
      const [editData, setEditData] = useState({
        status: trip.details.status, destination: trip.details.destination,
        eta: trip.details.eta,
        customerAssignments: initialAssignments,
        customDtInput: '',
        dtFocus: false
      });
      const [tripNotes, setTripNotes] = useState(trip.details.notes || '');

      // ─── Customer Assignment State ─────────────────────────────
      const [customerAssignments, setCustomerAssignments] = useState(() => {
        try { const p = JSON.parse(trip.details.notes || '{}'); return Array.isArray(p._customerAssignments) ? p._customerAssignments : []; }
        catch { return []; }
      });
      const [custPdfExporting, setCustPdfExporting] = useState(false);

      const [activeTab, setActiveTab] = useState(['SALES_STARTED', 'SALES_COMPLETED', 'CLOSED'].includes(trip.details.status) ? 'market' : 'dashboard');

      // Item data state: { manifest_id: { received, rate } }
      const [itemData, setItemData] = useState({});
      const [expenses, setExpenses] = useState({
        freight: trip.details.freight,
        coolie: trip.details.coolie,
        commission: trip.details.commission,
        other: trip.details.otherExpenses,
        note: trip.details.otherNote
      });

      // Initialize/Sync local state when switching trips
      useEffect(() => {
        setLocalDetails(trip.details);
        setEditData({ status: trip.details.status, destination: trip.details.destination, eta: trip.details.eta, dtName: trip.details.dtName, customerAssignments: Array.isArray((() => {try{return JSON.parse(trip.details.notes||'{}')}catch{return {}}})()._customerAssignments) ? JSON.parse(trip.details.notes||'{}')._customerAssignments : [] });
        setExpenses({
          freight: trip.details.freight,
          coolie: trip.details.coolie,
          commission: trip.details.commission,
          other: trip.details.otherExpenses,
          note: trip.details.otherNote
        });

        const initialItems = {};
        trip.marks.forEach(m => Object.values(m.grades).forEach(g => {
          initialItems[g.id] = { received: g.received ?? '', rate: g.rate || '' };
        }));
        setItemData(initialItems);

        setTripNotes(trip.details.notes || '');
        setShowStatusPrompt(false);
        setEditing(false); setSaveMsg('');
        setActiveTab(['SALES_STARTED', 'SALES_COMPLETED', 'CLOSED'].includes(trip.details.status) ? 'market' : 'dashboard');

        // Re-load customer assignments for the new trip
        try { const p = JSON.parse(trip.details.notes || '{}'); setCustomerAssignments(Array.isArray(p._customerAssignments) ? p._customerAssignments : []); }
        catch { setCustomerAssignments([]); }
      }, [trip.details.tripId]);

      const w = weatherFor(localDetails.destination);

      const totals = useMemo(() => {
        const g = {}; let grand = 0; let recvGrand = 0; let gross = 0;
        trip.gradeColumns.forEach(k => g[k] = 0);

        trip.marks.forEach(m => {
          Object.entries(m.grades).forEach(([k, v]) => {
            const data = itemData[v.id] || { received: v.received, rate: v.rate };
            g[k] = (g[k] || 0) + v.manifest;
            grand += v.manifest;
            const r = parseFloat(data.received) || 0;
            const rt = parseFloat(data.rate) || 0;
            recvGrand += r;
            gross += r * rt;
          });
        });

        const totalExp = (parseFloat(expenses.freight) || 0) + (parseFloat(expenses.coolie) || 0) + (parseFloat(expenses.commission) || 0) + (parseFloat(expenses.other) || 0);
        const net = gross - totalExp;
        const netPerBox = recvGrand > 0 ? Math.round(net / recvGrand) : 0;
        return { ...g, grand, recvGrand, gross, net, netPerBox };
      }, [trip, itemData, expenses]);

      const cap = Math.min(Math.round((totals.grand / MAX_TRUCK_CAPACITY) * 100), 100);
      const showSales = ['SALES_STARTED', 'SALES_COMPLETED', 'CLOSED'].includes(localDetails.status);

      const setEdit = (k, v) => setEditData(d => ({ ...d, [k]: v }));
      const setItem = (id, k, v) => setItemData(prev => ({ ...prev, [id]: { ...prev[id], [k]: v } }));

      const saveMarketData = async () => {
        setSaving(true); setSaveMsg('Saving records...'); setShowStatusPrompt(false);
        try {
          // 1. Update manifest items (Source of truth for current state)
          const updates = Object.entries(itemData).map(([id, data]) => ({
            id: id,
            received_boxes: data.received === '' ? null : parseInt(data.received),
            sales_rate: data.rate === '' ? null : parseFloat(data.rate)
          }));

          for (const up of updates) {
            const { error } = await supabase.from('trade_manifest').update({
              received_boxes: up.received_boxes,
              sales_rate: up.sales_rate
            }).eq('id', up.id);
            if (error) throw error;
          }

          // 2. Update destination expenses in dedicated table (Roadmap Phase 2)
          const destExps = [
            { type: 'Freight', amount: parseFloat(expenses.freight) || 0 },
            { type: 'Coolie', amount: parseFloat(expenses.coolie) || 0 },
            { type: 'Commission', amount: parseFloat(expenses.commission) || 0 },
            { type: 'Other', amount: parseFloat(expenses.other) || 0, notes: expenses.note || '' }
          ].filter(ex => ex.amount > 0);

          await supabase.from('expenses').delete().eq('trip_id', localDetails.tripId).eq('paid_by', 'Demand');
          if (destExps.length > 0) {
            const { error: eExp } = await supabase.from('expenses').insert(
              destExps.map(ex => ({
                trip_id: localDetails.tripId,
                expense_type: ex.type,
                amount: ex.amount,
                paid_by: 'Demand',
                notes: ex.notes || ''
              }))
            );
            if (eExp) throw eExp;
          }

          // 3. Record Sales Transactions (Roadmap Phase 2)
          const salesRecords = updates.filter(up => (up.received_boxes || 0) > 0 && (up.sales_rate || 0) > 0).map(up => {
            let variety = 'Unknown';
            // Find variety name from original manifest
            trip.marks.forEach(m => {
              Object.entries(m.grades).forEach(([k, v]) => { if (v.id === up.id) variety = k; });
            });

            return {
              trip_id: localDetails.tripId,
              variety_grade: variety,
              quantity: up.received_boxes,
              rate: up.sales_rate
              // total_amount is a GENERATED column in Supabase (quantity × rate), DB computes it
            };
          });

          if (salesRecords.length > 0) {
            await supabase.from('sales_transactions').delete().eq('trip_id', localDetails.tripId);
            const { error: eSales } = await supabase.from('sales_transactions').insert(salesRecords);
            if (eSales) throw eSales;
          }

          // Save trip notes + customer assignments merged
          const notesObj = (() => { try { return JSON.parse(trip.details.notes || '{}'); } catch { return {}; } })();
          notesObj._customerAssignments = brandAssignments;
          const mergedNotes = JSON.stringify(notesObj);
          if (mergedNotes !== (trip.details.notes || '')) {
            await supabase.from('trades').update({ notes: mergedNotes }).eq('trip_id', localDetails.tripId);
          }

          // Check if we should prompt for status bump
          const hasRates = Object.values(itemData).some(d => parseFloat(d.rate) > 0);
          const notYetCompleted = !['SALES_COMPLETED', 'CLOSED'].includes(localDetails.status);
          if (hasRates && notYetCompleted) setShowStatusPrompt(true);

          setSaveMsg('✓ Market data & transactions saved');
          onUpdate(localDetails.tripId, {
            ...localDetails,
            freight: expenses.freight,
            coolie: expenses.coolie,
            commission: expenses.commission,
            otherExpenses: expenses.other,
            otherNote: expenses.note,
            notes: mergedNotes
          });
          setTimeout(() => setSaveMsg(''), 4000);
        } catch (e) {
          setSaveMsg('❌ ' + (e.message || 'Save failed'));
        } finally { setSaving(false); }
      };

      // Persist customer assignments in Supabase notes field

        try {

        const salesStart = ['SALES_STARTED', 'SALES_COMPLETED', 'CLOSED'].includes(s);

        if (reachedMark) {
          if (!editData.destination?.trim()) { setSaveMsg('❌ Destination Market is required'); return; }
          if (!editData.eta) { setSaveMsg('❌ Arrival Date is required'); return; }

        if (salesStart) {

        }

        setSaving(true);
        try {
          const notesObj = (() => { try { return JSON.parse(localDetails.notes || '{}'); } catch { return {}; } })();
          
          let finalCustomerAssignments = editData.customerAssignments || [];
          let isMultiple = finalCustomerAssignments.length > 1;
          
          let finalDtName = finalCustomerAssignments.map(c => c.customerName).filter(Boolean).join(', ');

          if (!isMultiple) {

            if (!finalDtName) finalDtName = 'Unknown';

          notesObj._customerAssignments = finalCustomerAssignments;
          const mergedNotes = JSON.stringify(notesObj);

          const { error } = await supabase.from('trades').update({
            status: toDbStatus(editData.status),
            destination_market: editData.destination,
            arrival_date: editData.eta || null,
            dt_name: finalDtName,
            notes: mergedNotes
          }).eq('trip_id', localDetails.tripId);
          
          setCustomerAssignments(finalCustomerAssignments);
          if (error) throw error;
          const updated = { ...localDetails, status: editData.status, destination: editData.destination, eta: editData.eta, dtName: finalDtName, notes: mergedNotes };
          setLocalDetails(updated);
          onUpdate(localDetails.tripId, updated);
          setEditing(false);
          setSaveMsg('✓ Saved successfully');
          setTimeout(() => setSaveMsg(''), 3000);
        } catch (e) {
          setSaveMsg('❌ ' + (e.message || 'Save failed'));
        } finally { setSaving(false); }

      const addVideo = (e) => {

      const generateExportData = async () => {

        await new Promise(r => setTimeout(r, 50));

                           <div className="relative z-30" onBlur={e => {
                             if (!e.currentTarget.contains(e.relatedTarget)) setEdit(`markaFocus_${cIdx}`, false);
                           }}>
                             <div className="min-h-12 p-2 rounded-xl border border-slate-200 bg-white focus-within:border-emerald-400 flex flex-wrap gap-2 items-center cursor-text transition-colors shadow-inner"
                                  onClick={() => document.getElementById(`marka-input-${cIdx}`)?.focus()}>
                               
                               {/* Empty state pill hint */}
                               {cust.allocations.length === 0 && !editData[`markaFocus_${cIdx}`] && (
                                  <span className="text-xs font-semibold text-slate-400 italic px-2 absolute pointer-events-none">Select Markas to allocate...</span>
                               )}
                               
                               {/* Allocated Brands as Pills */}
                               {cust.allocations.map((alloc, aIdx) => (
                                 <div key={alloc.id || aIdx} className="bg-slate-50 border border-slate-200 flex items-stretch rounded-lg shadow-sm overflow-hidden group hover:border-emerald-300 transition-colors">
                                   <div className="bg-slate-100 px-2 py-1.5 border-r border-slate-200 flex items-center justify-center">
                                     <span className="text-[11px] font-black tracking-widest text-slate-700 uppercase max-w-[100px] truncate" title={alloc.brand}>{alloc.brand.split(' - ').pop()}</span>
                                   </div>
                                   <div className="flex items-center bg-white px-1 relative">
                                     <input type="number" value={alloc.boxes} min={1}
                                       onClick={e => e.stopPropagation()}
                                       onChange={e => {
                                          const upd = [...(editData.customerAssignments || [])];
                                          upd[cIdx].allocations[aIdx].boxes = e.target.value;
                                          setEdit('customerAssignments', upd);
                                       }}
                                       placeholder="Qty"
                                       className="w-14 text-center text-[11px] font-black text-amber-700 outline-none placeholder-slate-300 py-1.5 focus:bg-amber-50 rounded" style={{MozAppearance: 'textfield'}} />
                                     <span className="text-[9px] font-bold text-slate-400 mr-2 uppercase tracking-wide">bx</span>
                                   </div>
                                   <button type="button" onClick={(e) => {
                                       e.stopPropagation();
                                       const upd = [...(editData.customerAssignments || [])];
                                       upd[cIdx].allocations = upd[cIdx].allocations.filter((_, i) => i !== aIdx);
                                       setEdit('customerAssignments', upd);
                                     }}
                                     className="px-2.5 bg-slate-50 hover:bg-red-50 hover:text-red-500 text-slate-400 border-l border-slate-200 transition-colors flex items-center justify-center">
                                     <span className="text-[10px] font-black">✕</span>
                                   </button>
                                 </div>
                               ))}
                               
                               {/* Trigger Input */}
                               <input id={`marka-input-${cIdx}`} type="text"
                                 value="" readOnly
                                 onFocus={() => { setEdit(`markaFocus_${cIdx}`, true); }}
                                 className="flex-1 min-w-[50px] outline-none text-sm bg-transparent cursor-pointer h-8" />
                             </div>
                             
                             {/* Dropdown Options */}
                             {editData[`markaFocus_${cIdx}`] && (
                               <div className="absolute top-full mt-2 left-0 w-[100%] max-w-[400px] bg-white border border-slate-200 rounded-xl shadow-2xl max-h-56 overflow-y-auto pop-in z-50 py-1">
                                 {(() => {
                                    const available = trip.marks.filter(m => !cust.allocations.some(a => a.brand === m.name));
                                    if (available.length === 0) return <div className="px-4 py-3 text-xs text-slate-400 italic font-semibold text-center border-t border-slate-50">All brands selected</div>;
                                    return available.filter(m => {
                                       const total = Object.values(m.grades).reduce((s, g) => s + g.manifest, 0);
                                       let allocated = 0;
                                       (editData.customerAssignments || []).forEach(c => {
                                         c.allocations.forEach(a => { if (a.brand === m.name) allocated += (parseInt(a.boxes) || 0); });
                                       });
                                       return (total - allocated) > 0;
                                     }).map(m => {
                                      const bn = m.name;
                                      const total = Object.values(m.grades).reduce((s, g) => s + g.manifest, 0);
                                      
                                      const patternMatches = trip.loadingZones.filter(z => cleanBrandName(z.description) === cleanBrandName(bn));
                                      const patternText = patternMatches.length > 0 ? patternMatches.map(z => z.name).join(', ') : '';

                                      let allocated = 0;
                                      (editData.customerAssignments || []).forEach(c => {
                                        c.allocations.forEach(a => { if (a.brand === bn) allocated += (parseInt(a.boxes) || 0); });
                                      });
                                      const remaining = total - allocated;
                                      
                                      return (
                                        <button key={bn} type="button"
                                          onClick={() => {
                                            const upd = [...(editData.customerAssignments || [])];
                                            upd[cIdx].allocations.push({ id: Date.now().toString(), brand: bn, boxes: remaining.toString() });
                                            setEdit('customerAssignments', upd);
                                            setEdit(`markaFocus_${cIdx}`, false);
                                          }}
                                          className="w-full flex justify-between items-center px-4 py-2.5 hover:bg-emerald-50 cursor-pointer border-b border-slate-50 last:border-0 transition-colors group"
                                        >
                                          <div className="flex flex-col items-start truncate overflow-hidden pr-2">
                                            <span className="text-sm font-bold text-slate-700 group-hover:text-emerald-700 truncate">{bn.split(' - ').pop()}</span>
                                            {patternText && <span className="text-[9px] font-bold uppercase tracking-widest text-slate-400 group-hover:text-emerald-500 mt-0.5 truncate max-w-full">[{patternText}]</span>}
                                          </div>
                                          <span className={`text-[10px] font-bold px-2 py-0.5 rounded shadow-sm flex-shrink-0 ${remaining > 0 ? 'bg-slate-100 text-slate-600 border border-slate-200/50' : 'bg-red-50 text-red-600 border border-red-100'}`}>
                                            {remaining > 0 ? `${remaining} bx rem.` : '0 bx rem.'}
                                          </span>
                                        </button>
                                      );
                                    });
                                 })()}
                               </div>
                             )}
                           </div>
                        </div>
                        
                      </div>
                    ))}
                  </div>
                </div>
              </div>
              )}
              
                  <div className="flex items-center gap-3 pt-4 border-t border-slate-100 mt-4">
                    {saveMsg && <span className={`text-sm font-bold ${saveMsg.startsWith('✓') ? 'text-emerald-600' : 'text-red-500'}`}>{saveMsg}</span>}
                    <div className="flex gap-2 ml-auto">
                      <button onClick={() => { setEditing(false); setEditData({ status: localDetails.status, destination: localDetails.destination, eta: localDetails.eta, customerAssignments: customerAssignments, customDtInput: '', dtFocus: false }); }}
                        className="px-4 py-2 text-sm font-bold text-slate-600 bg-white border border-slate-200 rounded-lg hover:bg-slate-50">Cancel</button>
                      <button onClick={saveEdits} disabled={saving}
                        className="px-4 py-2 text-sm font-bold text-white bg-emerald-600 rounded-lg hover:bg-emerald-700 disabled:opacity-50 transition-colors">
                        {saving ? 'Saving…' : 'Save Changes'}
                      </button>
                    </div>
                  </div>
                </div>
              )}
              {saveMsg && !editing && (
                <div className="mb-4 px-4 py-2 bg-emerald-50 border border-emerald-200 text-emerald-700 text-sm font-bold rounded-lg fade-in flex items-center justify-between">
                  <span>{saveMsg}</span>
                  {saveMsg.includes(' manifest') && <span className="animate-spin text-xl">⏳</span>}
                </div>
              )}

              {/* Tab Navigation and Export */}
              <div className="flex border-b border-slate-100 mt-2 -mx-6 lg:-mx-8 px-6 lg:px-8 justify-between items-end">
                <div className="flex">
                  {(showSales
                    ? [
                      { id: 'market', label: '🛒 Market & Sales', count: null },
                      { id: 'dashboard', label: '📊 Dashboard', count: null },
                    ]
                    : [
                      { id: 'dashboard', label: '📊 Dashboard', count: null },
                      { id: 'market', label: '🛒 Market & Sales', count: null },
                    ]
                  ).map(t => (
                    <button key={t.id} onClick={() => setActiveTab(t.id)}
                      className={`px-4 py-3 text-xs font-black uppercase tracking-widest transition-all border-b-2
                        ${activeTab === t.id ? 'border-emerald-500 text-emerald-600' : 'border-transparent text-slate-400 hover:text-slate-600'}`}>
                      {t.label} {t.count !== null && <span className="ml-1 opacity-50">({t.count})</span>}
                    </button>
                  ))}
                </div>
                {activeTab === 'dashboard' && (
                  <div className="pb-2 pl-4 flex gap-2">
                    <button onClick={generateExportData} disabled={exportingType} className="px-4 py-1.5 bg-indigo-50 text-indigo-700 hover:bg-indigo-100 font-bold text-[10px] uppercase tracking-widest rounded-lg flex items-center gap-2 transition-colors border border-indigo-100 shadow-sm active:scale-95 disabled:opacity-50 min-w-[130px] justify-center">
                      {exportingType ? <span className="animate-spin tracking-normal text-sm leading-none">↻</span> : <span className="text-sm tracking-normal">👁️</span>} {exportingType ? 'Previewing...' : 'Preview & Download'}
                    </button>
                    
                  </div>
                )}
              </div>
            </div>
          </div>

          {activeTab === 'dashboard' && (
            <div className="space-y-6 fade-in">
              {/* Summary Stats moved here if needed, or keep in header if critical */}
              {showSales && totals.net > 0 && (
                <div className="p-4 bg-emerald-600 rounded-xl text-white flex flex-wrap gap-6 items-center shadow-lg">
                  <div>
                    <p className="text-[10px] font-bold uppercase opacity-80 tracking-widest">Net Realization</p>
                    <h3 className="text-2xl font-black">₹ {totals.net.toLocaleString()}</h3>
                  </div>
                  <div className="h-8 w-px bg-white/20"></div>
                  <div>
                    <p className="text-[10px] font-bold uppercase opacity-80 tracking-widest">Received Stock</p>
                    <h3 className="text-xl font-black">{totals.recvGrand} Boxes</h3>
                  </div>
                  {totals.netPerBox > 0 && (
                    <>
                      <div className="h-8 w-px bg-white/20"></div>
                      <div>
                        <p className="text-[10px] font-bold uppercase opacity-80 tracking-widest">Net / Box</p>
                        <h3 className="text-xl font-black">₹ {totals.netPerBox.toLocaleString()}</h3>
                      </div>
                    </>
                  )}
                </div>
              )}

                  <div className="text-sm font-bold text-slate-500 uppercase tracking-widest mt-3">Trip Manifest & Load Plan Statement</div>
                </div>

                <div className="space-y-3">

                  {/* ── TOP SUMMARY CARD: Origin → Destination + Weather ── */}
                  <div className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                    <div className="grid grid-cols-1 lg:grid-cols-13 divide-y lg:divide-y-0 lg:divide-x divide-slate-100" style={{ gridTemplateColumns: '5fr 1fr 4fr 2fr' }}>

                      {/* Left: Origin + Supplier */}
                      <div className="p-5">
                        <div className="flex items-start justify-between gap-4">
                          <div>
                            <div className="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1">Origin</div>
                            <div className="text-xl font-black text-slate-900">{localDetails.origin}</div>
                            <div className="text-xs font-semibold text-emerald-600 mt-1">
                              📅 {fmtDate(localDetails.dispatchDate)}
                              {localDetails.dispatchTime && <span className="ml-1.5 text-emerald-500 font-bold">{localDetails.dispatchTime}</span>}
                            </div>
                          </div>
                          <div className="text-right min-w-0 export-hide-supplier">
                            <div className="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1">Supplier</div>
                            <div className="text-sm font-bold text-slate-700 truncate pb-1" title={localDetails.supplier}>{localDetails.supplier}</div>
                          </div>
                        </div>
                      </div>

                      {/* Center Arrow */}
                      <div className="flex items-center justify-center p-3 text-slate-200 text-2xl select-none">→</div>

                      {/* Right: Customer + Destination */}
                      <div className="p-5">
                        <div className="flex items-start justify-between gap-4">
                          <div className="min-w-0">
                            <div className="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1">Customer / DT</div>
                            <div className="text-sm font-bold text-slate-700 truncate pb-1" title={localDetails.dtName || '—'}>{localDetails.dtName || '—'}</div>
                          </div>
                          <div className="text-right">
                            <div className="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1">Destination</div>
                            <div className="text-xl font-black text-slate-900">{localDetails.destination}</div>
                            <div className="text-xs font-semibold text-amber-600 mt-1">{localDetails.eta ? fmtDate(localDetails.eta) : '—'} ⏱</div>
                          </div>
                        </div>
                      </div>

                      {/* Weather Square */}
                      <div className="p-4 flex flex-col items-center justify-center gap-1 bg-slate-50">
                        <div className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Weather</div>
                        <div className="text-3xl leading-none mt-1">{w.icon}</div>
                        <div className="text-base font-black text-slate-900">{w.temp}</div>
                        <div className="text-[9px] text-slate-500">{w.cond}</div>
                      </div>

                    </div>
                  </div>

                  {/* ── SECONDARY ROW: 3 even columns ── */}
                  <div className="grid grid-cols-3 gap-3 items-stretch">

                    {/* Utilization */}
                    <div className="bg-white rounded-xl p-4 border border-slate-100 shadow-sm">
                      <div className="text-[9px] font-bold text-slate-400 uppercase tracking-wider mb-1">📦 Utilization</div>
                      <div className="flex justify-between items-baseline">
                        <span className="text-base font-black text-slate-900">{totals.grand}</span>
                        <span className="text-[10px] text-slate-400">/ {MAX_TRUCK_CAPACITY}</span>
                      </div>
                      <div className="w-full bg-slate-100 rounded-full h-1 mt-1.5 overflow-hidden">
                        <div className={`h-full rounded-full ${cap > 90 ? 'bg-red-500' : 'bg-indigo-400'}`} style={{ width: `${cap}%` }}></div>
                      </div>
                      <div className={`text-[9px] font-bold mt-1 ${cap > 90 ? 'text-red-500' : 'text-emerald-600'}`}>{cap}% Full</div>
                    </div>

                    {/* Vehicle + Driver */}
                    <div className="bg-white rounded-xl p-4 border border-slate-100 shadow-sm flex flex-col justify-between">
                      <div className="text-[9px] font-bold text-slate-400 uppercase tracking-wider mb-2">🚛 Vehicle & Driver</div>
                      <div className="flex justify-between items-center mt-auto">
                        <div className="text-lg font-black text-slate-800">{localDetails.vehicleNo}</div>
                        <div className="text-right">
                          <div className="text-base font-bold text-slate-700">{localDetails.driverName}</div>
                          <div className="text-xs font-semibold text-slate-400 mt-0.5">{localDetails.driverContact}</div>
                        </div>
                      </div>
                    </div>

                    {/* Track */}
                    <a href={trip.details.liveUrl} target="_blank" rel="noreferrer"
                      id="export-track-link"
                      className={`block bg-white rounded-xl py-5 px-4 border border-slate-100 shadow-sm h-full flex flex-col items-center justify-center transition-all hover:border-emerald-300 hover:shadow-md ${trip.details.liveUrl === '#' ? 'opacity-50 pointer-events-none' : ''}`}>
                      <div className="flex items-center gap-2 mb-2">
                        <span className="text-xl">🧭</span>
                        <div className="text-[9px] font-bold text-slate-400 uppercase tracking-wider">Live Tracking Link</div>
                      </div>
                      <div className="text-sm font-black text-emerald-600 truncate pb-1">
                        {trip.details.liveUrl === '#' ? 'No tracking available' : 'Click here to track shipment'}
                      </div>
                    </a>

                  </div>

                </div>


                {/* Manifest (Now part of Dashboard) */}
                <div className="pt-6 border-t border-slate-200">
                  <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 export-flex-row">

                    {/* Manifest */}
                    <div className="lg:col-span-2 bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden flex flex-col">
                      <div className="px-6 py-4 border-b border-slate-100 flex justify-between items-center">
                        <h2 className="text-sm font-bold text-slate-800 flex items-center gap-2">📋 Manifest Details</h2>
                        <div className="flex gap-4 text-xs font-bold px-3 py-1 bg-slate-50 rounded-lg border border-slate-200">
                          <div className="flex flex-col"><span className="text-slate-400 text-[9px] uppercase tracking-widest leading-none">Total</span> <span className="text-slate-900 leading-none mt-1">{totals.grand} Box</span></div>
                          <div className="w-px bg-slate-200"></div>
                          <div className="flex flex-col"><span className="text-slate-400 text-[9px] uppercase tracking-widest leading-none">Cap.</span> <span className={`${cap > 90 ? 'text-emerald-600' : 'text-slate-900'} leading-none mt-1`}>{cap}%</span></div>
                        </div>
                      </div>
                      <div className="overflow-x-auto">
                        <table className="w-full text-sm text-left border-collapse">
                          <thead>
                            <tr className="bg-slate-50 text-xs text-slate-500 font-bold uppercase border-b border-slate-200">
                              <th className="px-5 py-3 sticky left-0 bg-slate-50 border-r border-slate-200">Grade / Variety</th>
                              {trip.marks.map((m, i) => <th key={i} className="px-5 py-3 text-center min-w-[90px]">{cleanBrandName(m.name)}</th>)}
                              <th className="px-5 py-3 text-right sticky right-0 bg-slate-50 border-l border-slate-200">Total</th>
                            </tr>
                          </thead>
                          <tbody className="divide-y divide-slate-100">
                            {trip.marks.length === 0
                              ? <tr><td colSpan={trip.marks.length + 2} className="px-5 py-10 text-center text-slate-400 text-sm">No manifest data</td></tr>
                              : trip.gradeColumns.map(grade => (
                                <tr key={grade} className="hover:bg-slate-50 transition-colors">
                                  <td className="px-5 py-3 font-bold text-slate-700 border-r border-slate-100 sticky left-0 bg-white">{grade}</td>
                                  {trip.marks.map((m, i) => (
                                    <td key={i + grade} className="px-5 py-3 text-center">
                                      {m.grades[grade]?.manifest
                                        ? <span className="font-semibold text-slate-700">{m.grades[grade].manifest}</span>
                                        : <span className="text-slate-200">•</span>}
                                    </td>
                                  ))}
                                  <td className="px-5 py-3 text-right font-black text-slate-800 border-l border-slate-100 sticky right-0 bg-white">{totals[grade] || 0}</td>
                                </tr>
                              ))
                            }
                          </tbody>
                          {trip.marks.length > 0 && (
                            <tfoot className="border-t border-slate-200 bg-slate-50 font-bold">
                              <tr>
                                <td className="px-5 py-3 text-xs uppercase text-slate-500 sticky left-0 bg-slate-50 border-r border-slate-200">Totals</td>
                                {trip.marks.map((m, i) => {
                                  let cTot = 0; trip.gradeColumns.forEach(g => cTot += (m.grades[g]?.manifest || 0));
                                  return (
                                    <td key={i} className="px-5 py-3 text-center text-emerald-700 font-black">
                                      {cTot > 0 ? cTot : <span className="text-slate-200">•</span>}
                                    </td>
                                  );
                                })}
                                <td className="px-5 py-3 text-right text-slate-900 font-black text-base sticky right-0 bg-slate-50 border-l border-slate-200">{totals.grand}</td>
                              </tr>
                            </tfoot>
                          )}
                        </table>
                      </div>
                    </div>

                    {/* Load plan */}
                    <div className="bg-white rounded-xl border border-slate-200 shadow-sm flex flex-col">
                      <div className="px-6 py-4 border-b border-slate-100">

                      </div>
                      <div className="p-4 flex flex-col items-center flex-1 bg-slate-50/30">
                        <div className="relative w-full max-w-[200px] flex flex-col my-4">
                          <div className="h-10 mx-4 bg-gradient-to-b from-slate-700 to-slate-800 rounded-t-xl shadow-lg"></div>
                          <div className="bg-white border-4 border-slate-300 rounded-b-lg p-1 flex flex-col gap-1 shadow-xl min-h-[280px]">
                            {trip.loadingZones.length === 0
                              ? <div className="flex-1 flex items-center justify-center text-slate-300 text-xs border-2 border-dashed border-slate-200 rounded m-1">No Load Data</div>

    // ─── MULTI-SELECT DROPDOWN ────────────────────────────────
    function MultiSelect({ options, selected, onChange, placeholder }) {
      const [open, setOpen] = React.useState(false);
      const ref = React.useRef(null);
      React.useEffect(() => {
        const handler = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
      }, []);
      const toggle = val => onChange(selected.includes(val) ? selected.filter(v => v !== val) : [...selected, val]);
      const allSelected = selected.length === options.length && options.length > 0;
      const toggleAll = () => onChange(allSelected ? [] : options.map(o => o.value));
      const count = selected.length;
      return (
        <div ref={ref} className="relative">
          <button onClick={() => setOpen(o => !o)}
            className={`h-10 px-3 flex items-center gap-2 rounded-lg border text-sm font-bold transition-all min-w-[140px] cursor-pointer
              ${count > 0 ? 'border-emerald-400 bg-emerald-50 text-emerald-700' : 'border-slate-200 bg-white text-slate-600 hover:border-emerald-300'}`}>
            <span className="flex-1 text-left truncate">
              {count === 0 ? placeholder : count === options.length ? `All ${placeholder.replace('All ', '')}` : count === 1 ? options.find(o => o.value === selected[0])?.label || selected[0] : `${count} selected`}
            </span>
            {count > 0 && (
              <span onClick={e => { e.stopPropagation(); onChange([]); }}
                className="w-4 h-4 rounded-full bg-emerald-200 text-emerald-700 text-[10px] flex items-center justify-center hover:bg-red-200 hover:text-red-700 flex-shrink-0 font-black">
                ×
              </span>
            )}
            <span className="text-slate-400 text-[10px] flex-shrink-0">{open ? '▲' : '▼'}</span>
          </button>
          {open && (
            <div className="absolute top-12 left-0 z-50 bg-white border border-slate-200 rounded-xl shadow-xl min-w-[180px] max-h-64 overflow-y-auto py-1 fade-in">
              {/* Select All row */}
              {options.length > 1 && (
                <label className="flex items-center gap-2.5 px-3 py-2 hover:bg-slate-50 cursor-pointer border-b border-slate-100 mb-1">
                  <input type="checkbox" checked={allSelected} onChange={toggleAll}
                    className="w-3.5 h-3.5 accent-emerald-600 flex-shrink-0" />
                  <span className="text-xs font-black text-slate-500 uppercase tracking-wide">{allSelected ? 'Deselect All' : 'Select All'}</span>
                </label>
              )}
              {options.map(opt => (
                <label key={opt.value} className="flex items-center gap-2.5 px-3 py-2 hover:bg-slate-50 cursor-pointer">
                  <input type="checkbox" checked={selected.includes(opt.value)} onChange={() => toggle(opt.value)}
                    className="w-3.5 h-3.5 accent-emerald-600 flex-shrink-0" />
                  <span className="text-sm font-semibold text-slate-700">{opt.label}</span>
                </label>
              ))}
              {options.length === 0 && <p className="px-3 py-2 text-xs text-slate-400">No options</p>}
            </div>
          )}
        </div>
      );
    }

    // ─── DATE MULTI-PICKER (Single + Range tabs) ──────────────────────
    function DateMultiPicker({ selected, onChange }) {
      const [open, setOpen] = React.useState(false);
      const [mode, setMode] = React.useState('single'); // 'single' | 'range'
      const [singleVal, setSingleVal] = React.useState('');
      const [rangeFrom, setRangeFrom] = React.useState('');
      const [rangeTo, setRangeTo] = React.useState('');
      const ref = React.useRef(null);
      React.useEffect(() => {
        const handler = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
      }, []);

      const addDate = val => { if (val && !selected.includes(val)) onChange([...selected, val]); setSingleVal(''); };
      const removeDate = val => onChange(selected.filter(d => d !== val));

      const addRange = () => {
        if (!rangeFrom || !rangeTo) return;
        const from = new Date(rangeFrom), to = new Date(rangeTo);
        if (from > to) return;
        const dates = [];
        for (let d = new Date(from); d <= to; d.setDate(d.getDate() + 1)) {
          const iso = d.toISOString().slice(0, 10);
          if (!selected.includes(iso)) dates.push(iso);
        }
        onChange([...selected, ...dates]);
        setRangeFrom(''); setRangeTo('');
      };

      const count = selected.length;
      return (
        <div ref={ref} className="relative">
          <button onClick={() => setOpen(o => !o)}
            className={`h-10 px-3 flex items-center gap-2 rounded-lg border text-sm font-bold transition-all min-w-[140px] cursor-pointer
              ${count > 0 ? 'border-emerald-400 bg-emerald-50 text-emerald-700' : 'border-slate-200 bg-white text-slate-600 hover:border-emerald-300'}`}>
            <span className="flex-1 text-left">
              {count === 0 ? 'All Dates' : count === 1 ? fmtDate(selected[0]) : `${count} dates`}
            </span>
            {count > 0 && (
              <span onClick={e => { e.stopPropagation(); onChange([]); }}
                className="w-4 h-4 rounded-full bg-emerald-200 text-emerald-700 text-[10px] flex items-center justify-center hover:bg-red-200 hover:text-red-700 flex-shrink-0 font-black">
                ×
              </span>
            )}
            <span className="text-slate-400 text-[10px]">{open ? '▲' : '▼'}</span>
          </button>
          {open && (
            <div className="absolute top-12 left-0 z-50 bg-white border border-slate-200 rounded-xl shadow-xl min-w-[230px] py-2 fade-in">
              {/* Mode tabs */}
              <div className="flex px-2 gap-1 pb-2">
                {['single', 'range'].map(m => (
                  <button key={m} onClick={() => setMode(m)}
                    className={`flex-1 py-1 text-xs font-bold rounded-lg transition-all
                      ${mode === m ? 'bg-emerald-600 text-white' : 'text-slate-500 hover:bg-slate-100'}`}>
                    {m === 'single' ? 'Single Date' : 'Date Range'}
                  </button>
                ))}
              </div>
              {mode === 'single' ? (
                <div className="px-2 pb-1">
                  <input type="date" value={singleVal} onChange={e => setSingleVal(e.target.value)}
                    onKeyDown={e => e.key === 'Enter' && addDate(singleVal)}
                    className="w-full h-8 px-2 text-xs border border-slate-200 rounded-lg focus:border-emerald-400 outline-none" />
                  <button onClick={() => addDate(singleVal)} disabled={!singleVal}
                    className="mt-1 w-full h-7 bg-emerald-600 text-white text-xs font-bold rounded-lg hover:bg-emerald-700 disabled:opacity-40">+ Add Date</button>
                </div>
              ) : (
                <div className="px-2 pb-1 space-y-1">
                  <div className="grid grid-cols-2 gap-1">
                    <div>
                      <p className="text-[9px] font-bold text-slate-400 uppercase mb-0.5">From</p>
                      <input type="date" value={rangeFrom} onChange={e => setRangeFrom(e.target.value)}
                        className="w-full h-8 px-2 text-xs border border-slate-200 rounded-lg focus:border-emerald-400 outline-none" />
                    </div>
                    <div>
                      <p className="text-[9px] font-bold text-slate-400 uppercase mb-0.5">To</p>
                      <input type="date" value={rangeTo} min={rangeFrom} onChange={e => setRangeTo(e.target.value)}
                        className="w-full h-8 px-2 text-xs border border-slate-200 rounded-lg focus:border-emerald-400 outline-none" />
                    </div>
                  </div>
                  <button onClick={addRange} disabled={!rangeFrom || !rangeTo || rangeFrom > rangeTo}
                    className="w-full h-7 bg-emerald-600 text-white text-xs font-bold rounded-lg hover:bg-emerald-700 disabled:opacity-40">
                    + Add Range
                  </button>
                </div>
              )}
              {selected.length > 0 && (
                <div className="border-t border-slate-100 mt-1 pt-1 max-h-36 overflow-y-auto">
                  {selected.sort().map(d => (
                    <div key={d} className="flex items-center justify-between px-3 py-1 hover:bg-slate-50">
                      <span className="text-xs font-semibold text-slate-700">{fmtDate(d)}</span>
                      <button onClick={() => removeDate(d)} className="text-red-400 hover:text-red-600 text-xs font-black">×</button>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // ─── MAIN APP ─────────────────────────────────────────────────
    function App() {
      const [tab, setTab] = useState('fleet');
      const [allTrips, setAllTrips] = useState([]);
      const [selectedId, setSelectedId] = useState(null);
      const [filterDates, setFilterDates] = useState([]);
      const [filterMarkets, setFilterMarkets] = useState([]);
      const [filterStatuses, setFilterStatuses] = useState([]);
      const [filterSuppliers, setFilterSuppliers] = useState([]);
      const [filterCustomers, setFilterCustomers] = useState([]);
      const [syncing, setSyncing] = useState(false);
      const [error, setError] = useState(null);
      const [lastSynced, setLastSynced] = useState(null);
      const [isOnline, setIsOnline] = useState(navigator.onLine);

      useEffect(() => {
        const up = () => setIsOnline(true);
        const down = () => setIsOnline(false);
        window.addEventListener('online', up);
        window.addEventListener('offline', down);
        return () => { window.removeEventListener('online', up); window.removeEventListener('offline', down); };
      }, []);

      const currentTrip = allTrips.find(t => t.details.tripId === selectedId) || allTrips[0];

      const handleTripUpdate = useCallback((tripId, updatedDetails) => {
        setAllTrips(prev => prev.map(t =>
          t.details.tripId === tripId ? { ...t, details: updatedDetails } : t
        ));
      }, []);

      const sync = useCallback(async () => {
        setSyncing(true); setError(null);
        try {
          const { data: trades, error: e1 } = await supabase
            .from('trades').select('*').order('dispatch_date', { ascending: false });
          if (e1) throw e1;
          if (!trades?.length) { setAllTrips([]); throw new Error('No active trades found.'); }

          const ids = trades.map(t => t.trip_id);
          
          let allManifests = [];
          let allExpenses = [];
          
          // Helper to fetch all rows bridging the 1000-row limit
          const fetchAll = async (table) => {
             let rows = [];
             let from = 0;
             const step = 999;
             // Process chunks of ids because postgrest has URL length limits
             for (let i = 0; i < ids.length; i += 100) {
               const chunkIds = ids.slice(i, i + 100);
               while (true) {
                 const { data, error } = await supabase.from(table).select('*').in('trip_id', chunkIds).range(from, from + step);
                 if (error) throw error;
                 if (data && data.length > 0) rows.push(...data);
                 if (!data || data.length <= step) break;
                 from += step + 1;
               }
               from = 0;
             }
             return rows;
          };

          const mfstData = await fetchAll('trade_manifest');
          const expData = await fetchAll('expenses');

          const processed = processTrips(trades, mfstData, expData);
          setAllTrips(processed);
          setLastSynced(new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }));
        } catch (err) {
          setError(err.message || 'Sync failed.');
        } finally { setSyncing(false); }
      }, []);

      useEffect(() => { sync(); }, []);

      const markets = useMemo(() => {
        const set = new Set(allTrips.map(t => t.details.destination).filter(d => d && d !== '--'));
        return Array.from(set).sort();
      }, [allTrips]);

      const suppliers = useMemo(() => {
        const set = new Set(allTrips.map(t => t.details.supplier).filter(s => s && s !== '--'));
        return Array.from(set).sort();
      }, [allTrips]);

      const customers = useMemo(() => {
        const set = new Set(allTrips.map(t => t.details.dtName).filter(c => c && c.trim()));
        return Array.from(set).sort();
      }, [allTrips]);

      const filtered = useMemo(() => {
        return allTrips.filter(t => {
          const matchDate = filterDates.length ? filterDates.includes(t.details.dispatchDate) : true;
          const matchMarket = filterMarkets.length ? filterMarkets.includes(t.details.destination) : true;
          const matchStatus = filterStatuses.length ? filterStatuses.includes(t.details.status) : true;
          const matchSupplier = filterSuppliers.length ? filterSuppliers.includes(t.details.supplier) : true;
          const matchCustomer = filterCustomers.length ? filterCustomers.includes(t.details.dtName) : true;
          return matchDate && matchMarket && matchStatus && matchSupplier && matchCustomer;
        }).sort((a, b) => new Date(b.details.dispatchDate || 0) - new Date(a.details.dispatchDate || 0));
      }, [allTrips, filterDates, filterMarkets, filterStatuses, filterSuppliers, filterCustomers]);

      return (
        <div className="min-h-screen bg-[#F8FAFC] pb-10">

          {/* Navbar */}
          <nav className="bg-white border-b border-slate-200 sticky top-0 z-50">
            <div className="max-w-7xl mx-auto px-4 flex items-center justify-between h-16">
              <div onClick={() => setTab('fleet')} className="flex items-center gap-3 cursor-pointer">
                <div className="bg-emerald-600 text-white w-9 h-9 rounded-lg flex items-center justify-center text-lg shadow-sm">📦</div>
                <div>
                  <div className="font-black text-lg leading-none text-slate-900">NinjaTrack</div>
                  <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Logistics</div>
                </div>
              </div>

              <div className="flex items-center gap-3">
                {!isOnline && (
                  <span className="flex items-center gap-1.5 text-xs font-bold text-red-600 bg-red-50 border border-red-200 px-2.5 py-1 rounded-full">
                    <span className="w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse-dot inline-block"></span> Offline
                  </span>
                )}
                {lastSynced && isOnline && <span className="text-xs text-slate-400 hidden sm:block">Synced {lastSynced}</span>}
                  <button onClick={sync} disabled={syncing}
                    className={`flex items-center gap-1.5 h-10 px-4 py-2 rounded-lg text-sm font-bold border transition-all ${syncing ? 'bg-slate-50 text-slate-400 border-slate-200' : 'bg-slate-900 text-white hover:bg-emerald-600 border-transparent shadow-md'}`}>
                    <span className={syncing ? 'animate-spin inline-block' : 'inline-block'}>↻</span>
                    {syncing ? 'Syncing…' : 'Refresh'}
                  </button>
                  <div className="flex bg-slate-100 p-1 rounded-lg border border-slate-200">
                    {['fleet', 'view'].map(t => (
                    <button key={t} onClick={() => {
                      if (t === 'view' && allTrips.length > 0) { if (!selectedId) setSelectedId(allTrips[0].details.tripId); }
                      setTab(t);
                    }}
                      disabled={t === 'view' && allTrips.length === 0}
                      className={`px-3 py-1.5 rounded-md text-sm font-bold transition-all capitalize
                        ${tab === t ? 'bg-white text-slate-900 shadow-sm border border-slate-200' : 'text-slate-500 hover:text-slate-700'}
                        ${t === 'view' && allTrips.length === 0 ? 'opacity-40 cursor-not-allowed' : ''}`}>
                      {t === 'fleet' ? '⊞ Fleet' : '≡ Detail'}
                    </button>
                  ))}
                </div>
              </div>
            </div>
          </nav>

          {/* Main */}
          <main className="max-w-7xl mx-auto px-4">

            {tab === 'fleet' && (
              <div className="space-y-6 pt-6 fade-in">
                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-end gap-4">
                  <div>
                    <h2 className="text-3xl font-black text-slate-900">Fleet Overview</h2>
                    <p className="text-slate-400 mt-1 text-sm">Active dispatches</p>
                  </div>
                  <div className="flex flex-wrap items-center gap-3 w-full sm:w-auto mt-4 sm:mt-0 max-w-full">
                    <button
                      onClick={() => { setFilterDates([]); setFilterMarkets([]); setFilterStatuses([]); setFilterSuppliers([]); setFilterCustomers([]); }}
                      style={{ visibility: (filterDates.length || filterMarkets.length || filterStatuses.length || filterSuppliers.length || filterCustomers.length) ? 'visible' : 'hidden' }}
                      className="text-xs font-bold text-red-500 hover:text-red-700 px-2 py-1 bg-red-50 rounded-lg border border-red-100 transition-colors h-10">
                      ✕ Clear All
                    </button>

                    <DateMultiPicker selected={filterDates} onChange={setFilterDates} />

                    <MultiSelect
                      placeholder="All Markets"
                      options={markets.map(m => ({ value: m, label: m }))}
                      selected={filterMarkets}
                      onChange={setFilterMarkets}
                    />

                    <MultiSelect
                      placeholder="All Statuses"
                      options={STATUSES.map(s => ({ value: s.value, label: s.label }))}
                      selected={filterStatuses}
                      onChange={setFilterStatuses}
                    />

                    {suppliers.length > 0 && (
                      <MultiSelect
                        placeholder="All Suppliers"
                        options={suppliers.map(s => ({ value: s, label: s }))}
                        selected={filterSuppliers}
                        onChange={setFilterSuppliers}
                      />
                    )}

                    {customers.length > 0 && (
                      <MultiSelect
                        placeholder="All Customers"
                        options={customers.map(c => ({ value: c, label: c }))}
                        selected={filterCustomers}
                        onChange={setFilterCustomers}
                      />
                    )}

                    <div className="bg-white px-3 py-2 h-10 flex items-center rounded-lg border border-slate-200 text-sm font-semibold whitespace-nowrap">
                      Found: <span className="text-emerald-600 ml-1">{filtered.length}</span>
                    </div>


                  </div>
                </div>

                {error && (
                  <div className="flex items-center gap-2 px-4 py-3 bg-red-50 border border-red-200 text-red-600 rounded-xl text-sm font-bold">
                    ⚠️ {error}
                  </div>
                )}

                {syncing && allTrips.length === 0
                  ? <div className="flex flex-col items-center py-24 text-slate-400">
                    <span className="text-4xl animate-spin inline-block mb-4">↻</span>
                    <p className="font-bold">Connecting to Supabase…</p>
                  </div>
                  : filtered.length === 0
                    ? <div className="flex flex-col items-center py-24 bg-white rounded-2xl border border-dashed border-slate-300">
                      <span className="text-5xl mb-4">🚛</span>
                      <h3 className="font-bold text-slate-700">No Trades Found</h3>
                      <p className="text-sm text-slate-400 mt-1">Try refreshing or adjusting your filters.</p>
                    </div>
                    : <div>
                      {filtered.some(t => t.details.status !== 'CLOSED') && (
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
                          {filtered.filter(t => t.details.status !== 'CLOSED').map(t => (
                            <FleetCard key={t.details.tripId} trip={t} onClick={() => { setSelectedId(t.details.tripId); setTab('view'); }} />
                          ))}
                        </div>
                      )}
                      {filtered.some(t => t.details.status === 'CLOSED') && (
                        <div className="mt-8 pt-6 border-t border-slate-200">
                          <h3 className="text-xl font-black text-slate-800 mb-4 flex items-center gap-2">
                            <span className="w-2.5 h-2.5 rounded-full bg-slate-300"></span> Closed Trades
                          </h3>
                          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5 opacity-70 hover:opacity-100 transition-opacity">
                            {filtered.filter(t => t.details.status === 'CLOSED').map(t => (
                              <FleetCard key={t.details.tripId} trip={t} onClick={() => { setSelectedId(t.details.tripId); setTab('view'); }} />
                            ))}
                          </div>
                        </div>
                      )}
                    </div>
                }
              </div>
            )}

            {tab === 'view' && currentTrip && (
              <DetailView
                trip={currentTrip}
                allTrips={allTrips}
                onBack={() => setTab('fleet')}
                onSwitch={id => setSelectedId(id)}
                onUpdate={handleTripUpdate}
              />
            )}

          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
