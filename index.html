<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NinjaTrack – Trade Overview</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    .animate-pulse-dot {
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .4
      }
    }

    .animate-spin {
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      from {
        transform: rotate(0deg)
      }

      to {
        transform: rotate(360deg)
      }
    }

    .fade-in {
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    /* Sticky save float */
    .save-float {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 100;
      animation: fadeIn 0.3s ease;
    }
  </style>
</head>

<body class="bg-[#F8FAFC] text-slate-900 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useRef, useCallback } = React;

    // ─── CONFIG ──────────────────────────────────────────────────
    const SUPABASE_URL = 'https://oiyhrmvcsjxmnfofodhe.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_ol8Jx4QsNZ22v-C1zSBoNQ_AHLFAAFT';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const MAX_TRUCK_CAPACITY = 1200;

    // ─── HELPERS ─────────────────────────────────────────────────
    const fmtDate = (d) => {
      if (!d || d === '---') return d || '--';
      try {
        const dt = new Date(d);
        if (isNaN(dt)) return d;
        return new Intl.DateTimeFormat('en-GB', { day: 'numeric', month: 'short', weekday: 'short' }).format(dt);
      } catch { return d; }
    };

    const weatherFor = (city = '') => {
      const c = city.toLowerCase();
      if (c.includes('bangalore') || c.includes('bengaluru')) return { temp: '24°C', cond: 'Cloudy', icon: '☁️', alert: '' };
      if (c.includes('mumbai')) return { temp: '29°C', cond: 'Rain', icon: '🌧️', alert: 'Rain Risk' };
      if (c.includes('delhi') || c.includes('nokhra')) return { temp: '34°C', cond: 'Sunny', icon: '☀️', alert: 'High Heat' };
      if (c.includes('chennai')) return { temp: '30°C', cond: 'Humid', icon: '💨', alert: '' };
      return { temp: '27°C', cond: 'Clear', icon: '🌤️', alert: '' };
    };

    const ZONE_STYLES = [
      { bg: 'bg-indigo-50', border: 'border-indigo-200', text: 'text-indigo-800', badge: 'bg-indigo-100 text-indigo-700' },
      { bg: 'bg-rose-50', border: 'border-rose-200', text: 'text-rose-800', badge: 'bg-rose-100 text-rose-700' },
      { bg: 'bg-amber-50', border: 'border-amber-200', text: 'text-amber-800', badge: 'bg-amber-100 text-amber-700' },
      { bg: 'bg-emerald-50', border: 'border-emerald-200', text: 'text-emerald-800', badge: 'bg-emerald-100 text-emerald-700' },
      { bg: 'bg-cyan-50', border: 'border-cyan-200', text: 'text-cyan-800', badge: 'bg-cyan-100 text-cyan-700' },
    ];

    // ─── PROCESS RAW SUPABASE DATA ────────────────────────────────
    // Physical front-to-back order of loading positions (Driver Side = front/top of diagram)
    const ZONE_ORDER = ['Driver Side', '2nd From Driver Side', 'Middle', '2nd From Last', 'Opening Side'];
    // Canonical grade sort order for manifest table
    const GRADE_ORDER = ['SSSSS', 'SSSS', 'SSS', 'SS', 'S', 'SPL', 'A1', 'A2', 'A3', 'SB1', 'SB2', 'Loose A', 'Loose B', 'Super 1', 'Super 2', 'K', 'Green', 'Goli', 'F1', 'F2', 'Others'];

    function processTrips(trades, manifests, expenses = []) {
      return trades.map(trade => {
        const mfst = manifests.filter(m => m.trip_id === trade.trip_id);
        const exps = expenses.filter(e => e.trip_id === trade.trip_id);

        // Source-side expenses (Advances)
        const sourceExps = exps.filter(e => e.paid_by === 'Source');
        const transportAdvance = sourceExps.find(e => e.expense_type === 'Transport')?.amount || 0;

        // Demand-side expenses (Deductions)
        const demandExps = exps.filter(e => e.paid_by === 'Demand');
        const dMap = {};
        demandExps.forEach(e => {
          const key = e.expense_type.toLowerCase();
          dMap[key] = e.amount;
          if (key === 'other') dMap.note = e.notes;
        });

        const marksMap = new Map();
        const varietySet = new Set();
        let totalBoxes = 0;
        let totalReceived = 0;
        const zoneMap = new Map();

        mfst.forEach((item, idx) => {
          const brand = item.brand_name || 'Unbranded';
          const variety = item.variety_grade || 'Mix';
          const qty = item.quantity_boxes || 0;
          const recv = item.received_boxes ?? null;
          const rate = item.sales_rate ?? 0;

          varietySet.add(variety);
          totalBoxes += qty;
          if (recv !== null) totalReceived += recv;

          if (!marksMap.has(brand)) marksMap.set(brand, { id: `m-${idx}`, name: brand, grades: {} });

          marksMap.get(brand).grades[variety] = {
            id: item.id, // Store manifest item id for patching
            manifest: qty,
            received: recv,
            rate: rate
          };

          const pattern = item.packing_type || 'General';
          if (!zoneMap.has(pattern)) zoneMap.set(pattern, { count: 0, marks: new Set() });
          zoneMap.get(pattern).count += qty;
          if (brand) zoneMap.get(pattern).marks.add(brand);
        });

        // Sort zones front → back (Driver Side at top of truck diagram)
        const loadingZones = Array.from(zoneMap.entries())
          .sort(([a], [b]) => {
            const ai = ZONE_ORDER.indexOf(a); const bi = ZONE_ORDER.indexOf(b);
            return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
          })
          .map(([name, data], i) => {
            const s = ZONE_STYLES[i % ZONE_STYLES.length];
            return { id: `z-${i}`, name, description: Array.from(data.marks).join(', '), count: data.count, ...s };
          });

        return {
          details: {
            tripId: trade.trip_id,
            vehicleNo: trade.vehicle_number || 'Unknown',
            driverName: trade.driver_name || '--',
            driverContact: trade.driver_mobile || '--',
            origin: trade.source_location || '--',
            destination: trade.destination_market || '--',
            dispatchDate: trade.dispatch_date || '',
            eta: trade.arrival_date || '',
            status: ['CREATED', 'DISPATCHED', 'IN_TRANSIT'].includes(trade.status) ? 'IN_TRANSIT' : trade.status || 'IN_TRANSIT',
            liveUrl: trade.tracking_link || '#',
            supplier: trade.vendor_name || '--',
            tradeMode: trade.trade_mode || 'Commission',
            dtName: trade.dt_name || '',
            transportAdvance,
            freight: dMap.freight || trade.freight_amount || 0,
            coolie: dMap.coolie || trade.coolie_amount || 0,
            commission: dMap.commission || trade.commission_amount || 0,
            otherExpenses: dMap.other || trade.other_expenses || 0,
            otherNote: dMap.note || trade.other_expenses_note || '',
          },
          marks: Array.from(marksMap.values()),
          gradeColumns: Array.from(varietySet).sort((a, b) => {
            const ai = GRADE_ORDER.indexOf(a); const bi = GRADE_ORDER.indexOf(b);
            return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
          }),
          loadingZones,
          totalBoxes,
          totalReceived,
          rawManifest: mfst, // Store for easy reference
          videos: [],
        };
      });
    }

    // ─── STATUS BADGE ─────────────────────────────────────────────
    function StatusBadge({ status }) {
      const isTransit = status === 'IN_TRANSIT';
      const isArrived = status === 'REACHED_MARKET';
      const isSales = ['SALES_STARTED', 'SALES_COMPLETED'].includes(status);
      const isClosed = status === 'CLOSED';

      let cls = 'bg-slate-50 text-slate-600 border-slate-200';
      let dot = 'bg-slate-400';
      let label = status.replace(/_/g, ' ');

      if (isTransit) {
        cls = 'bg-emerald-50 text-emerald-700 border-emerald-200';
        dot = 'bg-emerald-500 animate-pulse-dot';
      } else if (isArrived) {
        cls = 'bg-blue-50 text-blue-700 border-blue-200';
        dot = 'bg-blue-500';
      } else if (isSales) {
        cls = 'bg-amber-50 text-amber-700 border-amber-200';
        dot = 'bg-amber-500';
      } else if (isClosed) {
        cls = 'bg-slate-900 text-slate-100 border-slate-800';
        dot = 'bg-slate-400';
      }

      return (
        <span className={`px-3 py-1 rounded-xl text-[11px] font-bold uppercase tracking-wide border flex items-center gap-1.5 ${cls}`}>
          <span className={`w-2 h-2 rounded-full ${dot}`}></span>{label}
        </span>
      );
    }

    // ─── QUICK STATUS PICKER ───────────────────────────────────
    // Inline 2-click status changer: click badge → pick new status → auto-saves
    function QuickStatusPicker({ currentStatus, tripId, onSaved, setSaveMsg }) {
      const [open, setOpen] = React.useState(false);
      const [saving, setSaving] = React.useState(false);
      const ref = React.useRef(null);
      React.useEffect(() => {
        const h = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
        document.addEventListener('mousedown', h);
        return () => document.removeEventListener('mousedown', h);
      }, []);

      const pick = async (newStatus) => {
        if (newStatus === currentStatus) { setOpen(false); return; }
        setSaving(true);
        try {
          const { error } = await supabase.from('trades').update({ status: toDbStatus(newStatus) }).eq('trip_id', tripId);
          if (error) throw error;
          onSaved(newStatus);
          setSaveMsg('✓ Status updated');
          setTimeout(() => setSaveMsg(''), 3000);
        } catch (e) {
          setSaveMsg('❌ ' + (e.message || 'Update failed'));
        } finally { setSaving(false); setOpen(false); }
      };

      return (
        <div ref={ref} className="relative">
          <button onClick={() => !saving && setOpen(o => !o)}
            title="Click to change status"
            className="flex items-center gap-1.5 hover:opacity-80 active:scale-95 transition-all cursor-pointer">
            <StatusBadge status={currentStatus} />
            <span className="text-slate-300 text-[10px]">{saving ? '🔄' : '▾'}</span>
          </button>
          {open && (
            <div style={{ position: 'fixed', top: saving ? 0 : undefined, zIndex: 9999 }}
              className="bg-white border border-slate-200 rounded-xl shadow-2xl py-1 min-w-[190px] fade-in"
              ref={node => {
                if (node && ref.current) {
                  const btn = ref.current.querySelector('button');
                  if (btn) {
                    const r = btn.getBoundingClientRect();
                    node.style.top = (r.bottom + 4) + 'px';
                    node.style.left = r.left + 'px';
                  }
                }
              }}>
              <p className="px-3 pt-1.5 pb-1 text-[9px] font-black text-slate-400 uppercase tracking-widest">Change Status</p>
              {STATUSES.map(s => (
                <button key={s.value} onClick={() => pick(s.value)}
                  className={`w-full text-left px-3 py-2 text-sm font-semibold flex items-center gap-2 hover:bg-slate-50 transition-colors
                    ${s.value === currentStatus ? 'text-emerald-700 bg-emerald-50 font-black' : 'text-slate-700'}`}>
                  {s.value === currentStatus && <span className="text-emerald-500 text-xs">✓</span>}
                  {s.label}
                </button>
              ))}
            </div>
          )}
        </div>
      );
    }

    // ─── FLEET CARD ───────────────────────────────────────────────
    function FleetCard({ trip, onClick }) {
      const isTransit = ['DISPATCHED', 'IN TRANSIT'].includes(trip.details.status);
      const isArrived = trip.details.status === 'ARRIVED MARKET';
      return (
        <div onClick={onClick}
          className="bg-white rounded-xl border border-slate-200 p-5 hover:shadow-lg hover:border-emerald-300 transition-all cursor-pointer group fade-in">
          <div className="flex justify-between items-start mb-4">
            <div className="flex items-center gap-3">
              <div className="w-10 h-10 rounded-lg bg-slate-100 flex items-center justify-center text-2xl group-hover:bg-emerald-50 transition-colors">🚛</div>
              <div>
                <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{trip.details.tripId}</div>
                <div className="font-bold text-slate-900">{trip.details.vehicleNo}</div>
              </div>
            </div>
            <StatusBadge status={trip.details.status} />
          </div>

          <div className="flex items-center justify-between mb-3 text-sm font-semibold text-slate-700">
            <span>{trip.details.origin}</span>
            <span className="text-slate-300 mx-2">→</span>
            <span>{trip.details.destination}</span>
          </div>

          <div className="grid grid-cols-3 gap-2 border-t border-slate-100 pt-3 text-xs">
            <div>
              <div className="text-slate-400 font-bold uppercase text-[10px] mb-0.5">Dispatch</div>
              <div className="font-bold text-slate-800">{fmtDate(trip.details.dispatchDate)}</div>
            </div>
            <div>
              <div className="text-slate-400 font-bold uppercase text-[10px] mb-0.5">Supplier</div>
              <div className="font-bold text-slate-800 truncate">{trip.details.supplier}</div>
            </div>
            <div className="text-right">
              <div className="text-slate-400 font-bold uppercase text-[10px] mb-0.5">Boxes</div>
              <div className="font-black text-emerald-600 text-sm">{trip.totalBoxes}</div>
            </div>
          </div>
        </div>
      );
    }

    // ─── DETAIL VIEW ──────────────────────────────────────────────
    // DB enum value → display label. Run: SELECT unnest(enum_range(NULL::trade_status)); to verify exact DB values.
    const STATUSES = [
      { value: 'IN_TRANSIT', label: 'In-transit' },
      { value: 'REACHED_MARKET', label: 'Reached Market' },
      { value: 'SALES_STARTED', label: 'Sales started' },
      { value: 'SALES_COMPLETED', label: 'Sales Completed' },
      { value: 'CLOSED', label: 'Closed' },
    ];
    // Map frontend display values → actual Supabase enum values
    const STATUS_TO_DB = {
      'IN_TRANSIT': 'DISPATCHED',       // DB uses DISPATCHED, we display as IN_TRANSIT
      'REACHED_MARKET': 'REACHED_MARKET',
      'SALES_STARTED': 'SALES_STARTED',
      'SALES_COMPLETED': 'SALES_COMPLETED',
      'CLOSED': 'CLOSED',
    };
    const toDbStatus = s => STATUS_TO_DB[s] || s;

    function DetailView({ trip, allTrips, onBack, onSwitch, onUpdate }) {
      const [videos, setVideos] = useState([]);
      const fileRef = useRef(null);
      const [editing, setEditing] = useState(false);
      const [saving, setSaving] = useState(false);
      const [saveMsg, setSaveMsg] = useState('');
      const [showStatusPrompt, setShowStatusPrompt] = useState(false);
      const [localDetails, setLocalDetails] = useState(trip.details);
      const [editData, setEditData] = useState({
        status: trip.details.status, destination: trip.details.destination,
        eta: trip.details.eta, dtName: trip.details.dtName,
      });
      const [tripNotes, setTripNotes] = useState(trip.details.notes || '');

      const [activeTab, setActiveTab] = useState('dashboard');

      // Item data state: { manifest_id: { received, rate } }
      const [itemData, setItemData] = useState({});
      const [expenses, setExpenses] = useState({
        freight: trip.details.freight,
        coolie: trip.details.coolie,
        commission: trip.details.commission,
        other: trip.details.otherExpenses,
        note: trip.details.otherNote
      });

      // Initialize/Sync local state when switching trips
      useEffect(() => {
        setLocalDetails(trip.details);
        setEditData({ status: trip.details.status, destination: trip.details.destination, eta: trip.details.eta, dtName: trip.details.dtName });
        setExpenses({
          freight: trip.details.freight,
          coolie: trip.details.coolie,
          commission: trip.details.commission,
          other: trip.details.otherExpenses,
          note: trip.details.otherNote
        });

        const initialItems = {};
        trip.marks.forEach(m => Object.values(m.grades).forEach(g => {
          initialItems[g.id] = { received: g.received ?? '', rate: g.rate || '' };
        }));
        setItemData(initialItems);

        setTripNotes(trip.details.notes || '');
        setShowStatusPrompt(false);
        setEditing(false); setSaveMsg('');
      }, [trip.details.tripId]);

      const w = weatherFor(localDetails.destination);

      const totals = useMemo(() => {
        const g = {}; let grand = 0; let recvGrand = 0; let gross = 0;
        trip.gradeColumns.forEach(k => g[k] = 0);

        trip.marks.forEach(m => {
          Object.entries(m.grades).forEach(([k, v]) => {
            const data = itemData[v.id] || { received: v.received, rate: v.rate };
            g[k] = (g[k] || 0) + v.manifest;
            grand += v.manifest;
            const r = parseFloat(data.received) || 0;
            const rt = parseFloat(data.rate) || 0;
            recvGrand += r;
            gross += r * rt;
          });
        });

        const totalExp = (parseFloat(expenses.freight) || 0) + (parseFloat(expenses.coolie) || 0) + (parseFloat(expenses.commission) || 0) + (parseFloat(expenses.other) || 0);
        const net = gross - totalExp;
        const netPerBox = recvGrand > 0 ? Math.round(net / recvGrand) : 0;
        return { ...g, grand, recvGrand, gross, net, netPerBox };
      }, [trip, itemData, expenses]);

      const cap = Math.min(Math.round((totals.grand / MAX_TRUCK_CAPACITY) * 100), 100);
      const showSales = ['SALES_STARTED', 'SALES_COMPLETED', 'CLOSED'].includes(localDetails.status);

      const setEdit = (k, v) => setEditData(d => ({ ...d, [k]: v }));
      const setItem = (id, k, v) => setItemData(prev => ({ ...prev, [id]: { ...prev[id], [k]: v } }));

      const saveMarketData = async () => {
        setSaving(true); setSaveMsg('Saving records...'); setShowStatusPrompt(false);
        try {
          // 1. Update manifest items (Source of truth for current state)
          const updates = Object.entries(itemData).map(([id, data]) => ({
            id: id,
            received_boxes: data.received === '' ? null : parseInt(data.received),
            sales_rate: data.rate === '' ? null : parseFloat(data.rate)
          }));

          for (const up of updates) {
            const { error } = await supabase.from('trade_manifest').update({
              received_boxes: up.received_boxes,
              sales_rate: up.sales_rate
            }).eq('id', up.id);
            if (error) throw error;
          }

          // 2. Update destination expenses in dedicated table (Roadmap Phase 2)
          const destExps = [
            { type: 'Freight', amount: parseFloat(expenses.freight) || 0 },
            { type: 'Coolie', amount: parseFloat(expenses.coolie) || 0 },
            { type: 'Commission', amount: parseFloat(expenses.commission) || 0 },
            { type: 'Other', amount: parseFloat(expenses.other) || 0, notes: expenses.note || '' }
          ].filter(ex => ex.amount > 0);

          await supabase.from('expenses').delete().eq('trip_id', localDetails.tripId).eq('paid_by', 'Demand');
          if (destExps.length > 0) {
            const { error: eExp } = await supabase.from('expenses').insert(
              destExps.map(ex => ({
                trip_id: localDetails.tripId,
                expense_type: ex.type,
                amount: ex.amount,
                paid_by: 'Demand',
                notes: ex.notes || ''
              }))
            );
            if (eExp) throw eExp;
          }

          // 3. Record Sales Transactions (Roadmap Phase 2)
          const salesRecords = updates.filter(up => (up.received_boxes || 0) > 0 && (up.sales_rate || 0) > 0).map(up => {
            let variety = 'Unknown';
            // Find variety name from original manifest
            trip.marks.forEach(m => {
              Object.entries(m.grades).forEach(([k, v]) => { if (v.id === up.id) variety = k; });
            });

            return {
              trip_id: localDetails.tripId,
              variety_grade: variety,
              quantity: up.received_boxes,
              rate: up.sales_rate
              // total_amount is a GENERATED column in Supabase (quantity × rate), DB computes it
            };
          });

          if (salesRecords.length > 0) {
            await supabase.from('sales_transactions').delete().eq('trip_id', localDetails.tripId);
            const { error: eSales } = await supabase.from('sales_transactions').insert(salesRecords);
            if (eSales) throw eSales;
          }

          // Save trip notes
          if (tripNotes !== (trip.details.notes || '')) {
            await supabase.from('trades').update({ notes: tripNotes }).eq('trip_id', localDetails.tripId);
          }

          // Check if we should prompt for status bump
          const hasRates = Object.values(itemData).some(d => parseFloat(d.rate) > 0);
          const notYetCompleted = !['SALES_COMPLETED', 'CLOSED'].includes(localDetails.status);
          if (hasRates && notYetCompleted) setShowStatusPrompt(true);

          setSaveMsg('✓ Market data & transactions saved');
          onUpdate(localDetails.tripId, {
            ...localDetails,
            freight: expenses.freight,
            coolie: expenses.coolie,
            commission: expenses.commission,
            otherExpenses: expenses.other,
            otherNote: expenses.note,
            notes: tripNotes
          });
          setTimeout(() => setSaveMsg(''), 4000);
        } catch (e) {
          setSaveMsg('❌ ' + (e.message || 'Save failed'));
        } finally { setSaving(false); }
      };

      const saveEdits = async () => {
        const s = editData.status;
        const reachedMark = ['REACHED_MARKET', 'SALES_STARTED', 'SALES_COMPLETED', 'CLOSED'].includes(s);
        const salesStart = ['SALES_STARTED', 'SALES_COMPLETED', 'CLOSED'].includes(s);

        if (reachedMark) {
          if (!editData.destination?.trim()) { setSaveMsg('❌ Destination Market is required'); return; }
          if (!editData.eta) { setSaveMsg('❌ Arrival Date is required'); return; }
        }
        if (salesStart) {
          if (!editData.dtName?.trim()) { setSaveMsg('❌ DT Name is required'); return; }
        }

        setSaving(true);
        try {
          const { error } = await supabase.from('trades').update({
            status: toDbStatus(editData.status),
            destination_market: editData.destination,
            arrival_date: editData.eta || null,
            dt_name: editData.dtName,
          }).eq('trip_id', localDetails.tripId);
          if (error) throw error;
          const updated = { ...localDetails, ...editData };
          setLocalDetails(updated);
          onUpdate(localDetails.tripId, updated);
          setEditing(false);
          setSaveMsg('✓ Saved successfully');
          setTimeout(() => setSaveMsg(''), 3000);
        } catch (e) {
          setSaveMsg('❌ ' + (e.message || 'Save failed'));
        } finally { setSaving(false); }
      };

      const addVideo = (e) => {
        const f = e.target.files?.[0]; if (!f) return;
        const url = URL.createObjectURL(f);
        setVideos(v => [...v, { id: Date.now(), title: f.name, url }]);
        e.target.value = '';
      };

      return (

                            <tr>
                              <td className="px-5 py-3 text-xs uppercase text-slate-500 sticky left-0 bg-slate-50 border-r border-slate-200">Totals</td>

                      <button onClick={() => fileRef.current?.click()}
                        className="flex items-center gap-1.5 text-xs font-bold text-purple-700 bg-purple-50 px-3 py-1.5 rounded-lg border border-purple-100 hover:bg-purple-100 transition-colors">

                      ? <div className="text-center py-10 border-2 border-dashed border-slate-200 rounded-xl">

                              className="absolute top-2 right-2 p-1 bg-black/50 text-white rounded-full hover:bg-red-500 opacity-0 group-hover:opacity-100 transition-all">✕</button>

    // ─── MULTI-SELECT DROPDOWN ────────────────────────────────
    function MultiSelect({ options, selected, onChange, placeholder }) {
      const [open, setOpen] = React.useState(false);
      const ref = React.useRef(null);
      React.useEffect(() => {
        const handler = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
      }, []);
      const toggle = val => onChange(selected.includes(val) ? selected.filter(v => v !== val) : [...selected, val]);
      const allSelected = selected.length === options.length && options.length > 0;
      const toggleAll = () => onChange(allSelected ? [] : options.map(o => o.value));
      const count = selected.length;
      return (
        <div ref={ref} className="relative">
          <button onClick={() => setOpen(o => !o)}
            className={`h-10 px-3 flex items-center gap-2 rounded-lg border text-sm font-bold transition-all min-w-[140px] cursor-pointer
              ${count > 0 ? 'border-emerald-400 bg-emerald-50 text-emerald-700' : 'border-slate-200 bg-white text-slate-600 hover:border-emerald-300'}`}>
            <span className="flex-1 text-left truncate">
              {count === 0 ? placeholder : count === options.length ? `All ${placeholder.replace('All ', '')}` : count === 1 ? options.find(o => o.value === selected[0])?.label || selected[0] : `${count} selected`}
            </span>
            {count > 0 && (
              <span onClick={e => { e.stopPropagation(); onChange([]); }}
                className="w-4 h-4 rounded-full bg-emerald-200 text-emerald-700 text-[10px] flex items-center justify-center hover:bg-red-200 hover:text-red-700 flex-shrink-0 font-black">
                ×
              </span>
            )}
            <span className="text-slate-400 text-[10px] flex-shrink-0">{open ? '▲' : '▼'}</span>
          </button>
          {open && (
            <div className="absolute top-12 left-0 z-50 bg-white border border-slate-200 rounded-xl shadow-xl min-w-[180px] max-h-64 overflow-y-auto py-1 fade-in">
              {/* Select All row */}
              {options.length > 1 && (
                <label className="flex items-center gap-2.5 px-3 py-2 hover:bg-slate-50 cursor-pointer border-b border-slate-100 mb-1">
                  <input type="checkbox" checked={allSelected} onChange={toggleAll}
                    className="w-3.5 h-3.5 accent-emerald-600 flex-shrink-0" />
                  <span className="text-xs font-black text-slate-500 uppercase tracking-wide">{allSelected ? 'Deselect All' : 'Select All'}</span>
                </label>
              )}
              {options.map(opt => (
                <label key={opt.value} className="flex items-center gap-2.5 px-3 py-2 hover:bg-slate-50 cursor-pointer">
                  <input type="checkbox" checked={selected.includes(opt.value)} onChange={() => toggle(opt.value)}
                    className="w-3.5 h-3.5 accent-emerald-600 flex-shrink-0" />
                  <span className="text-sm font-semibold text-slate-700">{opt.label}</span>
                </label>
              ))}
              {options.length === 0 && <p className="px-3 py-2 text-xs text-slate-400">No options</p>}
            </div>
          )}
        </div>
      );
    }

    // ─── DATE MULTI-PICKER (Single + Range tabs) ──────────────────────
    function DateMultiPicker({ selected, onChange }) {
      const [open, setOpen] = React.useState(false);
      const [mode, setMode] = React.useState('single'); // 'single' | 'range'
      const [singleVal, setSingleVal] = React.useState('');
      const [rangeFrom, setRangeFrom] = React.useState('');
      const [rangeTo, setRangeTo] = React.useState('');
      const ref = React.useRef(null);
      React.useEffect(() => {
        const handler = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
      }, []);

      const addDate = val => { if (val && !selected.includes(val)) onChange([...selected, val]); setSingleVal(''); };
      const removeDate = val => onChange(selected.filter(d => d !== val));

      const addRange = () => {
        if (!rangeFrom || !rangeTo) return;
        const from = new Date(rangeFrom), to = new Date(rangeTo);
        if (from > to) return;
        const dates = [];
        for (let d = new Date(from); d <= to; d.setDate(d.getDate() + 1)) {
          const iso = d.toISOString().slice(0, 10);
          if (!selected.includes(iso)) dates.push(iso);
        }
        onChange([...selected, ...dates]);
        setRangeFrom(''); setRangeTo('');
      };

      const count = selected.length;
      return (
        <div ref={ref} className="relative">
          <button onClick={() => setOpen(o => !o)}
            className={`h-10 px-3 flex items-center gap-2 rounded-lg border text-sm font-bold transition-all min-w-[140px] cursor-pointer
              ${count > 0 ? 'border-emerald-400 bg-emerald-50 text-emerald-700' : 'border-slate-200 bg-white text-slate-600 hover:border-emerald-300'}`}>
            <span className="flex-1 text-left">
              {count === 0 ? 'All Dates' : count === 1 ? fmtDate(selected[0]) : `${count} dates`}
            </span>
            {count > 0 && (
              <span onClick={e => { e.stopPropagation(); onChange([]); }}
                className="w-4 h-4 rounded-full bg-emerald-200 text-emerald-700 text-[10px] flex items-center justify-center hover:bg-red-200 hover:text-red-700 flex-shrink-0 font-black">
                ×
              </span>
            )}
            <span className="text-slate-400 text-[10px]">{open ? '▲' : '▼'}</span>
          </button>
          {open && (
            <div className="absolute top-12 left-0 z-50 bg-white border border-slate-200 rounded-xl shadow-xl min-w-[230px] py-2 fade-in">
              {/* Mode tabs */}
              <div className="flex px-2 gap-1 pb-2">
                {['single', 'range'].map(m => (
                  <button key={m} onClick={() => setMode(m)}
                    className={`flex-1 py-1 text-xs font-bold rounded-lg transition-all
                      ${mode === m ? 'bg-emerald-600 text-white' : 'text-slate-500 hover:bg-slate-100'}`}>
                    {m === 'single' ? 'Single Date' : 'Date Range'}
                  </button>
                ))}
              </div>
              {mode === 'single' ? (
                <div className="px-2 pb-1">
                  <input type="date" value={singleVal} onChange={e => setSingleVal(e.target.value)}
                    onKeyDown={e => e.key === 'Enter' && addDate(singleVal)}
                    className="w-full h-8 px-2 text-xs border border-slate-200 rounded-lg focus:border-emerald-400 outline-none" />
                  <button onClick={() => addDate(singleVal)} disabled={!singleVal}
                    className="mt-1 w-full h-7 bg-emerald-600 text-white text-xs font-bold rounded-lg hover:bg-emerald-700 disabled:opacity-40">+ Add Date</button>
                </div>
              ) : (
                <div className="px-2 pb-1 space-y-1">
                  <div className="grid grid-cols-2 gap-1">
                    <div>
                      <p className="text-[9px] font-bold text-slate-400 uppercase mb-0.5">From</p>
                      <input type="date" value={rangeFrom} onChange={e => setRangeFrom(e.target.value)}
                        className="w-full h-8 px-2 text-xs border border-slate-200 rounded-lg focus:border-emerald-400 outline-none" />
                    </div>
                    <div>
                      <p className="text-[9px] font-bold text-slate-400 uppercase mb-0.5">To</p>
                      <input type="date" value={rangeTo} min={rangeFrom} onChange={e => setRangeTo(e.target.value)}
                        className="w-full h-8 px-2 text-xs border border-slate-200 rounded-lg focus:border-emerald-400 outline-none" />
                    </div>
                  </div>
                  <button onClick={addRange} disabled={!rangeFrom || !rangeTo || rangeFrom > rangeTo}
                    className="w-full h-7 bg-emerald-600 text-white text-xs font-bold rounded-lg hover:bg-emerald-700 disabled:opacity-40">
                    + Add Range
                  </button>
                </div>
              )}
              {selected.length > 0 && (
                <div className="border-t border-slate-100 mt-1 pt-1 max-h-36 overflow-y-auto">
                  {selected.sort().map(d => (
                    <div key={d} className="flex items-center justify-between px-3 py-1 hover:bg-slate-50">
                      <span className="text-xs font-semibold text-slate-700">{fmtDate(d)}</span>
                      <button onClick={() => removeDate(d)} className="text-red-400 hover:text-red-600 text-xs font-black">×</button>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // ─── MAIN APP ─────────────────────────────────────────────────
    function App() {
      const [tab, setTab] = useState('fleet');
      const [allTrips, setAllTrips] = useState([]);
      const [selectedId, setSelectedId] = useState(null);
      const [filterDates, setFilterDates] = useState([]);
      const [filterMarkets, setFilterMarkets] = useState([]);
      const [filterStatuses, setFilterStatuses] = useState([]);
      const [syncing, setSyncing] = useState(false);
      const [error, setError] = useState(null);
      const [lastSynced, setLastSynced] = useState(null);
      const [isOnline, setIsOnline] = useState(navigator.onLine);

      useEffect(() => {
        const up = () => setIsOnline(true);
        const down = () => setIsOnline(false);
        window.addEventListener('online', up);
        window.addEventListener('offline', down);
        return () => { window.removeEventListener('online', up); window.removeEventListener('offline', down); };
      }, []);

      const currentTrip = allTrips.find(t => t.details.tripId === selectedId) || allTrips[0];

      const handleTripUpdate = useCallback((tripId, updatedDetails) => {
        setAllTrips(prev => prev.map(t =>
          t.details.tripId === tripId ? { ...t, details: updatedDetails } : t
        ));
      }, []);

      const sync = useCallback(async () => {
        setSyncing(true); setError(null);
        try {
          const { data: trades, error: e1 } = await supabase
            .from('trades').select('*').neq('status', 'CLOSED').order('dispatch_date', { ascending: false });
          if (e1) throw e1;
          if (!trades?.length) { setAllTrips([]); throw new Error('No active trades found.'); }

          const ids = trades.map(t => t.trip_id);
          const [mfstRes, expRes] = await Promise.all([
            supabase.from('trade_manifest').select('*').in('trip_id', ids),
            supabase.from('expenses').select('*').in('trip_id', ids)
          ]);

          if (mfstRes.error) throw mfstRes.error;
          if (expRes.error) throw expRes.error;

          const processed = processTrips(trades, mfstRes.data || [], expRes.data || []);
          setAllTrips(processed);
          setLastSynced(new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }));
        } catch (err) {
          setError(err.message || 'Sync failed.');
        } finally { setSyncing(false); }
      }, []);

      useEffect(() => { sync(); }, []);

      const markets = useMemo(() => {
        const set = new Set(allTrips.map(t => t.details.destination).filter(d => d && d !== '--'));
        return Array.from(set).sort();
      }, [allTrips]);

      const filtered = useMemo(() => {
        return allTrips.filter(t => {
          const matchDate = filterDates.length ? filterDates.includes(t.details.dispatchDate) : true;
          const matchMarket = filterMarkets.length ? filterMarkets.includes(t.details.destination) : true;
          const matchStatus = filterStatuses.length ? filterStatuses.includes(t.details.status) : true;
          return matchDate && matchMarket && matchStatus;
        });
      }, [allTrips, filterDates, filterMarkets, filterStatuses]);

      return (
        <div className="min-h-screen bg-[#F8FAFC] pb-10">

          {/* Navbar */}
          <nav className="bg-white border-b border-slate-200 sticky top-0 z-50">
            <div className="max-w-7xl mx-auto px-4 flex items-center justify-between h-16">
              <div onClick={() => setTab('fleet')} className="flex items-center gap-3 cursor-pointer">
                <div className="bg-emerald-600 text-white w-9 h-9 rounded-lg flex items-center justify-center text-lg shadow-sm">📦</div>
                <div>
                  <div className="font-black text-lg leading-none text-slate-900">NinjaTrack</div>
                  <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Logistics</div>
                </div>
              </div>

              <div className="flex items-center gap-3">
                {!isOnline && (
                  <span className="flex items-center gap-1.5 text-xs font-bold text-red-600 bg-red-50 border border-red-200 px-2.5 py-1 rounded-full">
                    <span className="w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse-dot inline-block"></span> Offline
                  </span>
                )}
                {lastSynced && isOnline && <span className="text-xs text-slate-400 hidden sm:block">Synced {lastSynced}</span>}
                <div className="flex bg-slate-100 p-1 rounded-lg border border-slate-200">
                  {['fleet', 'view'].map(t => (
                    <button key={t} onClick={() => {
                      if (t === 'view' && allTrips.length > 0) { if (!selectedId) setSelectedId(allTrips[0].details.tripId); }
                      setTab(t);
                    }}
                      disabled={t === 'view' && allTrips.length === 0}
                      className={`px-3 py-1.5 rounded-md text-sm font-bold transition-all capitalize
                        ${tab === t ? 'bg-white text-slate-900 shadow-sm border border-slate-200' : 'text-slate-500 hover:text-slate-700'}
                        ${t === 'view' && allTrips.length === 0 ? 'opacity-40 cursor-not-allowed' : ''}`}>
                      {t === 'fleet' ? '⊞ Fleet' : '≡ Detail'}
                    </button>
                  ))}
                </div>
              </div>
            </div>
          </nav>

          {/* Main */}
          <main className="max-w-7xl mx-auto px-4">

            {tab === 'fleet' && (
              <div className="space-y-6 pt-6 fade-in">
                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-end gap-4">
                  <div>
                    <h2 className="text-3xl font-black text-slate-900">Fleet Overview</h2>
                    <p className="text-slate-400 mt-1 text-sm">Active dispatches</p>
                  </div>
                  <div className="flex flex-wrap items-center gap-2 w-full sm:w-auto mt-4 sm:mt-0">
                    <button
                      onClick={() => { setFilterDates([]); setFilterMarkets([]); setFilterStatuses([]); }}
                      style={{ visibility: (filterDates.length || filterMarkets.length || filterStatuses.length) ? 'visible' : 'hidden' }}
                      className="text-xs font-bold text-red-500 hover:text-red-700 px-2 py-1 bg-red-50 rounded-lg border border-red-100 transition-colors h-10">
                      ✕ Clear All
                    </button>

                    <DateMultiPicker selected={filterDates} onChange={setFilterDates} />

                    <MultiSelect
                      placeholder="All Markets"
                      options={markets.map(m => ({ value: m, label: m }))}
                      selected={filterMarkets}
                      onChange={setFilterMarkets}
                    />

                    <MultiSelect
                      placeholder="All Statuses"
                      options={STATUSES.map(s => ({ value: s.value, label: s.label }))}
                      selected={filterStatuses}
                      onChange={setFilterStatuses}
                    />

                    <div className="bg-white px-3 py-2 h-10 flex items-center rounded-lg border border-slate-200 text-sm font-semibold whitespace-nowrap">
                      Found: <span className="text-emerald-600 ml-1">{filtered.length}</span>
                    </div>



                    <button onClick={sync} disabled={syncing}
                      className={`flex items-center gap-1.5 h-10 px-4 py-2 rounded-lg text-sm font-bold border transition-all ${syncing ? 'bg-slate-50 text-slate-400 border-slate-200' : 'bg-slate-900 text-white hover:bg-emerald-600 border-transparent shadow-md'}`}>
                      <span className={syncing ? 'animate-spin inline-block' : 'inline-block'}>↻</span>
                      {syncing ? 'Syncing…' : 'Refresh'}
                    </button>
                  </div>
                </div>

                {error && (
                  <div className="flex items-center gap-2 px-4 py-3 bg-red-50 border border-red-200 text-red-600 rounded-xl text-sm font-bold">
                    ⚠️ {error}
                  </div>
                )}

                {syncing && allTrips.length === 0
                  ? <div className="flex flex-col items-center py-24 text-slate-400">
                    <span className="text-4xl animate-spin inline-block mb-4">↻</span>
                    <p className="font-bold">Connecting to Supabase…</p>
                  </div>
                  : filtered.length === 0
                    ? <div className="flex flex-col items-center py-24 bg-white rounded-2xl border border-dashed border-slate-300">
                      <span className="text-5xl mb-4">🚛</span>
                      <h3 className="font-bold text-slate-700">No Active Trades Found</h3>
                      <p className="text-sm text-slate-400 mt-1">Try refreshing or check your Supabase tables.</p>
                    </div>
                    : <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
                      {filtered.map(t => (
                        <FleetCard key={t.details.tripId} trip={t} onClick={() => { setSelectedId(t.details.tripId); setTab('view'); }} />
                      ))}
                    </div>
                }
              </div>
            )}

            {tab === 'view' && currentTrip && (
              <DetailView
                trip={currentTrip}
                allTrips={allTrips}
                onBack={() => setTab('fleet')}
                onSwitch={id => setSelectedId(id)}
                onUpdate={handleTripUpdate}
              />
            )}

          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
